<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolução // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <main class="container">
        <div class="bento-grid">
            <!-- Header -->
            <div class="card-shell reveal" style="grid-column: span 12;">
                <div class="card-core" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-md);">
                    <div>
                        <span class="eyebrow">Acompanhamento Biométrico</span>
                        <h1 style="margin: 4px 0;">RELATÓRIO DE EVOLUÇÃO</h1>
                        <p style="color: var(--text-secondary); font-size: 0.85rem;">Histórico de progresso e métricas de composição corporal.</p>
                    </div>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="grid-stack" style="grid-column: span 12;">
                <div class="card-shell reveal" style="animation-delay: 0.1s;">
                    <div class="card-core" style="text-align: center;">
                        <span class="eyebrow">PESO ATUAL</span>
                        <div id="current-weight" style="font-size: 2rem; font-weight: 800; color: #FFF; margin-top: 12px;">-- kg</div>
                    </div>
                </div>
                <div class="card-shell reveal" style="animation-delay: 0.2s;">
                    <div class="card-core" style="text-align: center;">
                        <span class="eyebrow">PESO INICIAL</span>
                        <div id="initial-weight" style="font-size: 2rem; font-weight: 800; color: #FFF; margin-top: 12px;">-- kg</div>
                    </div>
                </div>
                <div class="card-shell reveal" style="animation-delay: 0.3s;">
                    <div class="card-core" style="text-align: center;">
                        <span class="eyebrow">DIFERENÇA TOTAL</span>
                        <div id="weight-diff" style="font-size: 2rem; font-weight: 800; color: var(--accent); margin-top: 12px;">-- kg</div>
                    </div>
                </div>
                <div class="card-shell reveal" style="animation-delay: 0.4s;">
                    <div class="card-core" style="text-align: center;">
                        <span class="eyebrow">AVALIAÇÕES</span>
                        <div id="total-assessments" style="font-size: 2rem; font-weight: 800; color: #FFF; margin-top: 12px;">0</div>
                    </div>
                </div>
            </div>

            <!-- History Section -->
            <div class="card-shell reveal" style="grid-column: span 12; animation-delay: 0.5s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg);">HISTÓRICO DE MEDIÇÕES</h3>
                    <div id="history-container" style="display: flex; flex-direction: column; gap: var(--space-md);">
                        <!-- Injected by JS -->
                        <div style="text-align: center; padding: 48px; color: var(--text-secondary);">CARREGANDO HISTÓRICO...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container" style="padding: var(--space-xl) var(--space-md); text-align: center; color: var(--text-secondary); font-size: 0.7rem; letter-spacing: 0.1em;">
        &copy; 2026 SHAPETRACK // HIGH-END PERFORMANCE ECOSYSTEM
    </footer>

    <script src="js/config.js?v=3.5"></script>
    <script>
        async function init() {
            const context = await App.init('relatorio.html');
            if (!context) return;
            loadAssessments(context.session.user.id);
        }

        async function loadAssessments(userId) {
            const { data, error } = await sb.from('assessments').select('*').eq('client_id', userId).order('created_at', { ascending: false });
            
            if (data && data.length > 0) {
                const latest = data[0];
                const oldest = data[data.length - 1];
                
                document.getElementById('current-weight').innerText = latest.weight + ' kg';
                document.getElementById('initial-weight').innerText = oldest.weight + ' kg';
                document.getElementById('weight-diff').innerText = (latest.weight - oldest.weight).toFixed(1) + ' kg';
                document.getElementById('total-assessments').innerText = data.length;

                const container = document.getElementById('history-container');
                container.innerHTML = data.map(item => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-md); background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px;">
                        <div>
                            <div style="font-weight: 700; font-size: 0.85rem;">${new Date(item.created_at).toLocaleDateString('pt-BR')}</div>
                            <div style="font-size: 0.7rem; color: var(--text-secondary);">AVALIAÇÃO BIOMÉTRICA</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 800; color: var(--accent);">${item.weight} kg</div>
                            <div style="font-size: 0.6rem; color: var(--text-secondary);">${item.body_fat || '--'}% BF</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('history-container').innerHTML = `<div style="text-align: center; padding: 48px; color: var(--text-secondary);">NENHUMA AVALIAÇÃO REGISTRADA AINDA.</div>`;
            }
        }

        init();
    </script>
</body>
</html>
