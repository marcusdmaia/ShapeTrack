<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Evolução | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8faf9;
            --primary: #2F5948;
            --primary-light: #3d755e;
            --accent: #D96C2B;
            --text-main: #1a1c1b;
            --text-dim: #64748b;
            --white: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--primary); padding: 40px 24px; display: flex; flex-direction: column; color: white; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 48px; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: rgba(255, 255, 255, 0.6); text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }

        /* Content */
        .main-content { flex: 1; padding: 48px; max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .page-title { font-size: 2.2rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        .card { background: white; padding: 32px; border-radius: 24px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 24px; }
        .section-title { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: #f8faf9; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; text-align: center; }
        .stat-card .label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        /* History Table */
        .table-responsive { width: 100%; overflow-x: auto; }
        .history-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .history-table th { text-align: left; padding: 15px; color: var(--text-dim); border-bottom: 2px solid #f1f5f9; font-size: 0.8rem; text-transform: uppercase; }
        .history-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: 72px; padding: 0; position: fixed; 
                bottom: 0; left: 0; top: auto;
                flex-direction: row; background: var(--nav-bg); backdrop-filter: blur(20px); 
                border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; 
            }
            .logo { display: none; }
            .nav-links { 
                flex-direction: row; width: 100%; height: 100%; gap: 0; 
                overflow-x: auto; scrollbar-width: none; 
            }
            .nav-links::-webkit-scrollbar { display: none; }
            .nav-item { 
                flex: 0 0 80px; flex-direction: column; gap: 5px; border-radius: 0; 
                font-size: 0.65rem; color: #94a3b8; padding: 10px 0;
            }
            .nav-item.active { background: transparent; color: var(--primary); }
            .main-content { padding: 24px; padding-bottom: 120px; }
            .header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 class="page-title">Minha Evolução</h1>
                <p style="color: var(--text-dim);">Acompanhe seus resultados e progresso físico.</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><span class="label">Peso Atual</span><div class="value" id="current-weight">-- kg</div></div>
            <div class="stat-card"><span class="label">Peso Inicial</span><div class="value" id="initial-weight">-- kg</div></div>
            <div class="stat-card"><span class="label">Diferença</span><div class="value" id="weight-diff" style="color: var(--accent);">-- kg</div></div>
            <div class="stat-card"><span class="label">Avaliações</span><div class="value" id="total-assessments">0</div></div>
        </div>

        <div class="card">
            <h2 class="section-title"><i class="fas fa-chart-area"></i> Gráfico de Peso</h2>
            <canvas id="weightChart" height="150"></canvas>
        </div>

        <div class="card">
            <h2 class="section-title"><i class="fas fa-history"></i> Histórico de Medidas</h2>
            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Peso</th>
                            <th>Gordura %</th>
                            <th>Massa Musc %</th>
                            <th>Cintura</th>
                            <th>Quadril</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr><td colspan="6" style="text-align:center; padding: 40px; color: var(--text-dim);">Carregando histórico...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const sb = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');
        let currentUser = null;

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            currentUser = session.user;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) setupNav(profile);

            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('aluno') || currentUser.id;
            loadAssessments(studentId);
        }

        function setupNav(profile) {
            const nav = document.getElementById('nav-links');
            let navHtml = `
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
                <a href="crm_dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Gestão 360</span></a>
                <a href="vendas.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Vendas</span></a>
            `;
            if (profile.role === 'admin' || profile.role === 'superadmin') {
                navHtml += `
                    <a href="videos.html" class="nav-item"><i class="fas fa-play-circle"></i><span>Vídeos</span></a>
                    <a href="parcerias.html" class="nav-item"><i class="fas fa-handshake"></i><span>Parcerias</span></a>
                    <a href="alunos.html" class="nav-item"><i class="fas fa-users"></i><span>Alunos</span></a>
                    <a href="leads_admin.html" class="nav-item"><i class="fas fa-filter"></i><span>Leads</span></a>
                    <a href="configuracoes.html" class="nav-item"><i class="fas fa-cog"></i><span>Ajustes</span></a>
                `;
            } else {
                navHtml += `<a href="relatorio.html" class="nav-item active"><i class="fas fa-chart-line"></i><span>Evolução</span></a>`;
                navHtml += `<a href="configuracoes.html" class="nav-item"><i class="fas fa-cog"></i><span>Ajustes</span></a>`;
            }
            navHtml += `<a href="#" class="nav-item" onclick="handleLogout()" style="margin-top:auto; color:#ef4444;"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>`;
            nav.innerHTML = navHtml;
        }

        async function loadAssessments(studentId) {
            const { data: assessments } = await sb.from('assessments').select('*').eq('student_id', studentId).order('created_at', { ascending: true });
            
            if (!assessments || assessments.length === 0) {
                document.getElementById('history-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: var(--text-dim);">Nenhuma avaliação encontrada.</td></tr>';
                return;
            }

            // Stats
            const last = assessments[assessments.length - 1];
            const first = assessments[0];
            const diff = last.weight - first.weight;

            document.getElementById('current-weight').textContent = `${last.weight} kg`;
            document.getElementById('initial-weight').textContent = `${first.weight} kg`;
            document.getElementById('weight-diff').textContent = `${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg`;
            document.getElementById('total-assessments').textContent = assessments.length;

            // Table
            const historyBody = document.getElementById('history-body');
            historyBody.innerHTML = assessments.map(a => `
                <tr>
                    <td>${new Date(a.created_at).toLocaleDateString('pt-BR')}</td>
                    <td style="font-weight:800; color:var(--primary);">${a.weight} kg</td>
                    <td>${a.body_fat}%</td>
                    <td>${a.muscle_mass}%</td>
                    <td>${a.waist} cm</td>
                    <td>${a.hip} cm</td>
                </tr>
            `).reverse().join('');

            // Chart
            const ctx = document.getElementById('weightChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: assessments.map(a => new Date(a.created_at).toLocaleDateString('pt-BR')),
                    datasets: [{
                        label: 'Peso (kg)',
                        data: assessments.map(a => a.weight),
                        borderColor: '#2F5948',
                        backgroundColor: 'rgba(47, 89, 72, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false }, x: { grid: { display: false } } }
                }
            });
        }

        async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
