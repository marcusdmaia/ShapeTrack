<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolução | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f5;
            --sidebar-bg: #2F5948;
            --accent: #D96C2B;
            --text-main: #1a1a1a;
            --text-dim: #666666;
            --card-bg: #ffffff;
            --green: #27ae60;
            --red: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--sidebar-bg);
            margin: 0;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--sidebar-bg);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .logo span { color: var(--accent); }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-stat {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--sidebar-bg);
        }

        .comparison {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .comp-item {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 30px;
        }

        .chart-title {
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--sidebar-bg);
        }

        .btn-back {
            background: var(--sidebar-bg);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
    <div class="header">
        <h1 class="page-title" id="client-name">Relatório de Evolução</h1>
        <a href="dashboard.html" class="btn-back">Voltar ao Início</a>
    </div>

    <div class="grid-stats">
        <div class="card-stat">
            <span class="stat-label">Peso Atual</span>
            <div class="stat-value" id="val-weight">-- kg</div>
            <div class="comparison">
                <div class="comp-item">Recente: <span id="trend-weight-recent">--</span></div>
                <div class="comp-item">Total: <span id="trend-weight-total">--</span></div>
            </div>
        </div>
        <div class="card-stat">
            <span class="stat-label">% Gordura (Omron)</span>
            <div class="stat-value" id="val-fat">-- %</div>
            <div class="comparison">
                <div class="comp-item">Recente: <span id="trend-fat-recent">--</span></div>
                <div class="comp-item">Total: <span id="trend-fat-total">--</span></div>
            </div>
        </div>
        <div class="card-stat">
            <span class="stat-label">% Músculo Esquelético</span>
            <div class="stat-value" id="val-muscle">-- %</div>
            <div class="comparison">
                <div class="comp-item">Recente: <span id="trend-muscle-recent">--</span></div>
                <div class="comp-item">Total: <span id="trend-muscle-total">--</span></div>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-title">Evolução de Composição Corporal</div>
        <div id="mainChart"></div>
    </div>

    <div class="grid-stats">
        <div class="card-stat">
            <span class="stat-label">Gordura Visceral</span>
            <div class="stat-value" id="val-visceral">--</div>
        </div>
        <div class="card-stat">
            <span class="stat-label">Idade Corporal</span>
            <div class="stat-value" id="val-age">-- anos</div>
        </div>
        <div class="card-stat">
            <span class="stat-label">Metabolismo Basal</span>
            <div class="stat-value" id="val-metabolism">-- kcal</div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://xsgjttyrxhwmtxlvbdoa.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadReport() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return;

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('alunoId') || session.user.id;

        const { data: assessments } = await supabaseClient
            .from('assessments')
            .select('*')
            .eq('client_id', targetId)
            .order('created_at', { ascending: true });

        if (!assessments || assessments.length === 0) {
            alert('Ainda não existem avaliações registradas.');
            return;
        }

        renderStats(assessments);
        renderChart(assessments);
    }

    function renderStats(data) {
        const last = data[data.length - 1];
        const penult = data.length > 1 ? data[data.length - 2] : last;
        const first = data[0];

        document.getElementById('val-weight').textContent = `${last.weight} kg`;
        document.getElementById('val-fat').textContent = `${last.fat_percentage} %`;
        document.getElementById('val-muscle').textContent = `${last.muscle_percentage} %`;
        document.getElementById('val-visceral').textContent = last.visceral_fat;
        document.getElementById('val-age').textContent = `${last.body_age}`;
        document.getElementById('val-metabolism').textContent = last.basal_metabolism;

        const calcTrend = (now, past, isInverse = true) => {
            const diff = (now - past).toFixed(1);
            const color = isInverse ? (diff <= 0 ? '#27ae60' : '#e74c3c') : (diff >= 0 ? '#27ae60' : '#e74c3c');
            const sign = diff > 0 ? '+' : '';
            return `<span style="color: ${color}; font-weight: bold;">${sign}${diff}</span>`;
        };

        document.getElementById('trend-weight-recent').innerHTML = calcTrend(last.weight, penult.weight);
        document.getElementById('trend-weight-total').innerHTML = calcTrend(last.weight, first.weight);
        document.getElementById('trend-fat-recent').innerHTML = calcTrend(last.fat_percentage, penult.fat_percentage);
        document.getElementById('trend-fat-total').innerHTML = calcTrend(last.fat_percentage, first.fat_percentage);
        document.getElementById('trend-muscle-recent').innerHTML = calcTrend(last.muscle_percentage, penult.muscle_percentage, false);
        document.getElementById('trend-muscle-total').innerHTML = calcTrend(last.muscle_percentage, first.muscle_percentage, false);
    }

    function renderChart(data) {
        const options = {
            series: [
                { name: 'Peso (kg)', data: data.map(d => d.weight) },
                { name: '% Gordura', data: data.map(d => d.fat_percentage) },
                { name: '% Músculo', data: data.map(d => d.muscle_percentage) },
                { name: 'IMC', data: data.map(d => d.imc) },
                { name: 'Gordura Visceral', data: data.map(d => d.visceral_fat) },
                { name: 'Idade Corporal', data: data.map(d => d.body_age) }
            ],
            chart: {
                height: 450,
                type: 'line',
                toolbar: { show: true },
                fontFamily: 'Inter, sans-serif'
            },
            colors: ['#2F5948', '#D96C2B', '#27ae60', '#2980b9', '#8e44ad', '#f39c12'],
            stroke: { curve: 'smooth', width: 3 },
            xaxis: {
                categories: data.map(d => new Date(d.created_at).toLocaleDateString('pt-BR')),
            },
            yaxis: {
                title: { text: 'Valores' }
            },
            legend: { position: 'top' },
            markers: { size: 4 }
        };

        const chart = new ApexCharts(document.querySelector("#mainChart"), options);
        chart.render();
    }
    loadReport();
</script>
</body>
</html>
