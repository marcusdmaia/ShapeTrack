<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Evolução | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header" style="margin-bottom: 40px;">
            <div>
                <h1 class="page-title">Minha Evolução</h1>
                <p style="color: var(--text-dim);">Acompanhe seus resultados e progresso físico.</p>
            </div>
        </header>

        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px;">
            <div class="card" style="text-align: center; padding: 20px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 5px;">Peso Atual</span>
                <div class="value" id="current-weight" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">-- kg</div>
            </div>
            <div class="card" style="text-align: center; padding: 20px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 5px;">Peso Inicial</span>
                <div class="value" id="initial-weight" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">-- kg</div>
            </div>
            <div class="card" style="text-align: center; padding: 20px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 5px;">Diferença</span>
                <div class="value" id="weight-diff" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">-- kg</div>
            </div>
            <div class="card" style="text-align: center; padding: 20px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 5px;">Avaliações</span>
                <div class="value" id="total-assessments" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">0</div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-chart-area"></i> Gráfico de Peso</h2>
            <div style="width: 100%; height: 300px; position: relative;">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-history"></i> Histórico de Medidas</h2>
            <div class="table-responsive" style="width: 100%; overflow-x: auto;">
                <table class="table" style="width: 100%; min-width: 600px;">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Peso</th>
                            <th>Gordura %</th>
                            <th>Massa Musc %</th>
                            <th>Cintura</th>
                            <th>Quadril</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr><td colspan="6" style="text-align:center; padding: 40px; color: var(--text-dim);">Carregando histórico...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'relatorio.html');

            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('aluno') || session.user.id;
            loadAssessments(studentId);
        }

        async function loadAssessments(studentId) {
            const { data: assessments } = await sb.from('assessments').select('*').eq('student_id', studentId).order('created_at', { ascending: true });
            
            if (!assessments || assessments.length === 0) {
                document.getElementById('history-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: var(--text-dim);">Nenhuma avaliação encontrada.</td></tr>';
                return;
            }

            const last = assessments[assessments.length - 1];
            const first = assessments[0];
            const diff = last.weight - first.weight;

            document.getElementById('current-weight').textContent = `${last.weight} kg`;
            document.getElementById('initial-weight').textContent = `${first.weight} kg`;
            document.getElementById('weight-diff').textContent = `${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg`;
            document.getElementById('total-assessments').textContent = assessments.length;

            const historyBody = document.getElementById('history-body');
            historyBody.innerHTML = assessments.map(a => `
                <tr>
                    <td>${new Date(a.created_at).toLocaleDateString('pt-BR')}</td>
                    <td style="font-weight:800; color:var(--primary);">${a.weight} kg</td>
                    <td>${a.body_fat}%</td>
                    <td>${a.muscle_mass}%</td>
                    <td>${a.waist} cm</td>
                    <td>${a.hip} cm</td>
                </tr>
            `).reverse().join('');

            const ctx = document.getElementById('weightChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: assessments.map(a => new Date(a.created_at).toLocaleDateString('pt-BR')),
                    datasets: [{
                        label: 'Peso (kg)',
                        data: assessments.map(a => a.weight),
                        borderColor: '#2F5948',
                        backgroundColor: 'rgba(47, 89, 72, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false }, x: { grid: { display: false } } }
                }
            });
        }

        init();
    </script>
</body>
</html>
