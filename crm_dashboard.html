<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão 360 // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: var(--space-lg); }
        th { text-align: left; padding: var(--space-md); font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--glass-border); }
        td { padding: var(--space-md); font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .badge { padding: 4px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .badge-warning { background: rgba(217, 108, 43, 0.1); color: var(--accent); }
    </style>
</head>
<body>

    <nav class="navbar reveal"></nav>

    <main class="container">
        <div class="bento-grid">
            <!-- Header -->
            <div class="card-shell reveal" style="grid-column: span 12;">
                <div class="card-core">
                    <span class="eyebrow">Monitoramento Ativo</span>
                    <h1 style="margin: 4px 0;">GESTÃO 360º</h1>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Visão completa da retenção e saúde do ecossistema.</p>
                </div>
            </div>

            <!-- Summary Stats -->
            <div class="grid-stack" style="grid-column: span 12;">
                <div class="card-shell reveal" style="animation-delay: 0.1s;">
                    <div class="card-core">
                        <span class="eyebrow">CONTAS A RECEBER</span>
                        <div id="pending-revenue" style="font-size: 2rem; font-weight: 800; color: var(--accent); margin-top: 12px;">R$ 0,00</div>
                    </div>
                </div>
                <div class="card-shell reveal" style="animation-delay: 0.2s;">
                    <div class="card-core">
                        <span class="eyebrow">RISCO DE EVASÃO</span>
                        <div id="churn-risk" style="font-size: 2rem; font-weight: 800; color: #FF4B4B; margin-top: 12px;">0</div>
                    </div>
                </div>
                <div class="card-shell reveal" style="animation-delay: 0.3s;">
                    <div class="card-core">
                        <span class="eyebrow">ANIVERSARIANTES</span>
                        <div id="birthdays" style="font-size: 2rem; font-weight: 800; color: #FFF; margin-top: 12px;">0</div>
                    </div>
                </div>
                <div class="card-shell reveal" style="animation-delay: 0.4s;">
                    <div class="card-core">
                        <span class="eyebrow">CONVERSÃO LEAD</span>
                        <div id="conversion-rate" style="font-size: 2rem; font-weight: 800; color: #FFF; margin-top: 12px;">0%</div>
                    </div>
                </div>
            </div>

            <!-- Main Table -->
            <div class="card-shell reveal" style="grid-column: span 12; animation-delay: 0.5s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg);">FLUXO DE RETENÇÃO</h3>
                    <div style="overflow-x: auto;">
                        <table id="retention-table">
                            <thead>
                                <tr>
                                    <th>CLIENTE</th>
                                    <th>ÚLTIMA AVALIAÇÃO</th>
                                    <th>STATUS</th>
                                    <th>AÇÃO</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container" style="padding: var(--space-xl) var(--space-md); text-align: center; color: var(--text-secondary); font-size: 0.7rem; letter-spacing: 0.1em;">
        &copy; 2026 SHAPETRACK // HIGH-END PERFORMANCE ECOSYSTEM
    </footer>

    <script src="js/config.js?v=3.5"></script>
    <script>
        async function init() {
            const context = await App.init('crm_dashboard.html');
            if (!context) return;
            loadCRM(context.session.user.id);
        }

        async function loadCRM(userId) {
            const { data: profiles } = await sb.from('profiles').select('*').eq('mentor_id', userId).eq('role', 'client');
            const { data: sales } = await sb.from('sales').select('*').eq('mentor_id', userId);
            
            if (profiles) {
                const tbody = document.querySelector('#retention-table tbody');
                tbody.innerHTML = profiles.map(p => {
                    const status = p.status || 'Ativo';
                    const badgeClass = status === 'Inativo' ? 'badge-danger' : (status === 'Risco' ? 'badge-warning' : '');
                    return `
                        <tr>
                            <td style="font-weight: 600;">${p.full_name.toUpperCase()}</td>
                            <td style="color: var(--text-secondary);">${p.last_assessment || 'N/A'}</td>
                            <td><span class="badge ${badgeClass}">${status.toUpperCase()}</span></td>
                            <td><a href="perfil_aluno.html?id=${p.id}" class="btn" style="padding: 8px 16px; font-size: 0.7rem; background: rgba(255,255,255,0.05);">VER PERFIL</a></td>
                        </tr>
                    `;
                }).join('');
            }
        }

        init();
    </script>
</body>
</html>
