<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <div class="bento-grid">
        <!-- Header Section -->
        <div class="card-shell reveal span-12">
            <div class="card-core">
                <div class="header-content">
                    <span class="eyebrow">Acesso Verificado</span>
                    <h1 id="profile_name">CARREGANDO...</h1>
                </div>
                <div class="header-actions" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;">
                    <button class="btn btn-primary" onclick="openModal('modal-aluno')" style="padding: 10px 16px; font-size: 0.75rem;">
                        <i class="ph-light ph-user-plus"></i> ALUNO
                    </button>
                    <a href="vendas.html" class="btn btn-primary" style="padding: 10px 16px; font-size: 0.75rem;">
                        <i class="ph-light ph-shopping-cart-simple"></i> VENDA
                    </a>
                    <button class="btn btn-primary" onclick="window.location.href='lancar_avaliacao.html'" style="padding: 10px 16px; font-size: 0.75rem;">
                        <i class="ph-light ph-chart-line-up"></i> AVALIAÇÃO
                    </button>
                    <a href="estoque.html?action=loan" class="btn btn-primary" style="padding: 10px 16px; font-size: 0.75rem;">
                        <i class="ph-light ph-package"></i> EMPRÉSTIMO
                    </a>
                    <button class="btn btn-primary" onclick="copyFunnelLink()" style="padding: 10px 16px; font-size: 0.75rem;">
                        <i class="ph-light ph-funnel"></i> LINK
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid-stack span-12">
            <div class="card-shell reveal" style="animation-delay: 0.1s;">
                <div class="card-core">
                    <span class="eyebrow">CLIENTES ATIVOS</span>
                    <div id="total-clients" class="stat-value">0</div>
                </div>
            </div>
            <div class="card-shell reveal" style="animation-delay: 0.2s;">
                <div class="card-core">
                    <span class="eyebrow">EVOLUÇÃO MÉDIA</span>
                    <div class="stat-value">+12%</div>
                </div>
            </div>
            <div class="card-shell reveal" style="animation-delay: 0.3s;">
                <div class="card-core">
                    <span class="eyebrow">RECEITA BRUTA</span>
                    <div id="total-revenue" class="stat-value" style="color: var(--accent);">R$ 0,00</div>
                </div>
            </div>
        </div>

        <!-- Manual Student Modal -->
        <div id="modal-aluno" class="modal">
            <div class="card-shell modal-card">
                <div class="card-core">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3>CADASTRO MANUAL</h3>
    <!-- Manual Student Modal -->
    <div id="modal-aluno" class="modal">
        <div class="card-shell" style="width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <div class="card-core">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 style="font-size: 1.2rem;">NOVO ALUNO <span class="text-gradient">MANUAL</span></h2>
                    <button class="btn-close" onclick="closeModal('modal-aluno')"><i class="ph-bold ph-x"></i></button>
                </div>
                
                <form id="form-manual-aluno">
                    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="form-group span-2" style="grid-column: span 2;">
                            <label>NOME COMPLETO</label>
                            <input type="text" id="m_name" placeholder="EX: JOÃO DA SILVA" required>
                        </div>
                        <div class="form-group">
                            <label>WHATSAPP</label>
                            <input type="text" id="m_whatsapp" placeholder="11999999999" required>
                        </div>
                        <div class="form-group">
                            <label>E-MAIL</label>
                            <input type="email" id="m_email" placeholder="email@exemplo.com" required>
                        </div>
                        <div class="form-group">
                            <label>NASCIMENTO</label>
                            <input type="date" id="m_birth">
                        </div>
                        <div class="form-group">
                            <label>ALTURA (CM)</label>
                            <input type="number" id="m_height" placeholder="175">
                        </div>
                        <div class="form-group">
                            <label>GÊNERO</label>
                            <select id="m_gender">
                                <option value="masculino">MASCULINO</option>
                                <option value="feminino">FEMININO</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>OBJETIVO</label>
                            <select id="m_goal">
                                <option value="perda">PERDA DE PESO</option>
                                <option value="ganho">GANHO DE MASSA</option>
                                <option value="manutencao">MANUTENÇÃO</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>DESCONTO (%)</label>
                            <select id="m_discount">
                                <option value="0">0% (Preço Cheio)</option>
                                <option value="14">14% (Cliente Premium)</option>
                                <option value="23">23% (Cliente Premium Prata)</option>
                                <option value="32">32% (Cliente Premium Ouro)</option>
                                <option value="25">25% (Distribuidor)</option>
                                <option value="35">35% (Consultor Senior)</option>
                                <option value="42">42% (Construtor de Sucesso)</option>
                                <option value="50">50% (Supervisor)</option>
                            </select>
                        </div>
                        <div class="form-group span-2" style="grid-column: span 2;">
                            <label>OBSERVAÇÕES DO PROTOCOLO</label>
                            <textarea id="m_notes" placeholder="HISTÓRICO, RESTRIÇÕES, ETC..." style="width: 100%; height: 80px; background: #FFFFFF; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); padding: 12px;"></textarea>
                        </div>
                        <div class="form-group span-2" style="grid-column: span 2; display: flex; align-items: center; gap: 12px; background: #F8FAFC; padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border);">
                            <input type="checkbox" id="m_business" style="width: 20px; height: 20px;">
                            <label style="margin-bottom: 0;">NEGÓCIO APRESENTADO?</label>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 32px;">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-aluno')">CANCELAR</button>
                        <button type="submit" class="btn btn-primary">CADASTRAR ATIVO</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
        </div>
    </div>

    <script src="js/config.js?v=3.9"></script>
    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function copyFunnelLink() {
            const link = window.location.origin + '/index.html';
            navigator.clipboard.writeText(link).then(() => {
                showToast('Link do Funil copiado!');
            });
        }

        async function init() {
            const context = await App.init('dashboard.html');
            if (!context) return;
            
            // Redirect students to reports/shop
            if (context.profile.role === 'aluno') {
                window.location.href = 'relatorio.html';
                return;
            }

            document.getElementById('profile_name').innerText = context.profile.full_name.toUpperCase();
            loadStats(context.profile.id);

            document.getElementById('form-manual-aluno').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;

                const payload = {
                    full_name: document.getElementById('m_name').value,
                    whatsapp: document.getElementById('m_whatsapp').value,
                    birthday: document.getElementById('m_birth').value,
                    height: parseInt(document.getElementById('m_height').value),
                    gender: document.getElementById('m_gender').value,
                    goal: document.getElementById('m_goal').value,
                    discount_level: parseInt(document.getElementById('m_discount').value),
                    notes: document.getElementById('m_notes').value,
                    business_presented: document.getElementById('m_business').checked,
                    role: 'client',
                    mentor_id: context.profile.id,
                    is_active: true
                };

                const { error } = await sb.from('profiles').insert(payload);

                if (error) {
                    showToast(error.message, 'error');
                } else {
                    showToast('Aluno cadastrado com sucesso!');
                    closeModal('modal-aluno');
                    loadStats(context.profile.id);
                    e.target.reset();
                }
                btn.disabled = false;
            });
        }

        async function loadStats(userId) {
            try {
                const { data: clients } = await sb.from('profiles').select('id').eq('mentor_id', userId).eq('role', 'client');
                const { data: sales } = await sb.from('sales').select('total_price').eq('mentor_id', userId);
                
                if (clients) document.getElementById('total-clients').innerText = clients.length;
                if (sales) {
                    const total = sales.reduce((sum, s) => sum + parseFloat(s.total_price || 0), 0);
                    document.getElementById('total-revenue').innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                }
            } catch (e) {
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
