<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body>

    <nav class="navbar reveal">
        <a href="dashboard.html" class="nav-logo">SHAPE<span>TRACK</span></a>
        <div id="nav-links" class="nav-links desktop-only">
            <!-- Injected by JS -->
        </div>
        <div class="menu-toggle mobile-only">
            <i class="ph-light ph-dots-three-vertical"></i>
        </div>
    </nav>

    <div class="bento-grid">
        <!-- Header Section -->
        <div class="card-shell reveal" style="grid-column: span 12;">
            <div class="card-core" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <span class="eyebrow">Acesso Verificado</span>
                    <h1 id="profile_name" style="font-size: clamp(1.5rem, 5vw, 3rem);">CARREGANDO...</h1>
                </div>
                <div>
                    <button class="btn btn-primary" onclick="window.location.href='lancar_avaliacao.html'">
                        NOVA AVALIAÇÃO
                        <div class="btn-icon"><i class="ph-light ph-arrow-up-right"></i></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.1s;">
            <div class="card-core">
                <i class="ph-light ph-users" style="font-size: 2rem; color: var(--accent);"></i>
                <div style="margin-top: 24px;">
                    <span class="label" style="font-size: 0.75rem; color: var(--text-secondary);">CLIENTES ATIVOS</span>
                    <h2 id="total-clients" style="font-size: 2.5rem; margin-top: 8px;">0</h2>
                </div>
            </div>
        </div>

        <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.2s;">
            <div class="card-core">
                <i class="ph-light ph-trend-up" style="font-size: 2rem; color: var(--accent);"></i>
                <div style="margin-top: 24px;">
                    <span class="label" style="font-size: 0.75rem; color: var(--text-secondary);">EVOLUÇÃO MÉDIA</span>
                    <h2 style="font-size: 2.5rem; margin-top: 8px;">+12%</h2>
                </div>
            </div>
        </div>

        <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.3s;">
            <div class="card-core">
                <i class="ph-light ph-currency-dollar" style="font-size: 2rem; color: var(--accent);"></i>
                <div style="margin-top: 24px;">
                    <span class="label" style="font-size: 0.75rem; color: var(--text-secondary);">RECEITA BRUTA</span>
                    <h2 id="total-revenue" style="font-size: 2.5rem; margin-top: 8px;">R$ 0,00</h2>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card-shell reveal" style="grid-column: span 8; animation-delay: 0.4s;">
            <div class="card-core">
                <h3 style="margin-bottom: 24px;">ATALHOS DO SISTEMA</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <a href="vendas.html" class="btn" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #FFF; justify-content: flex-start;">
                        <i class="ph-light ph-bolt"></i>
                        GESTÃO DE VENDAS
                    </a>
                    <a href="alunos.html" class="btn" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #FFF; justify-content: flex-start;">
                        <i class="ph-light ph-user-focus"></i>
                        PERFIL DOS ALUNOS
                    </a>
                </div>
            </div>
        </div>

        <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.5s;">
            <div class="card-core" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <i class="ph-light ph-shield-check" style="font-size: 3rem; color: var(--accent); opacity: 0.5;"></i>
                <p style="margin-top: 16px; color: var(--text-secondary); font-size: 0.8rem;">SISTEMA PROTEGIDO POR PROTOCOLO SHAPETRACK</p>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3.0"></script>
    <script>
        async function init() {
            const context = await App.init('dashboard.html');
            if (!context) return;
            
            document.getElementById('profile_name').innerText = context.profile.full_name.toUpperCase();
            loadStats(context.session.user.id);
        }

        async function loadStats(userId) {
            try {
                const { data: clients } = await sb.from('profiles').select('id').eq('mentor_id', userId).eq('role', 'client');
                const { data: sales } = await sb.from('sales').select('value').eq('mentor_id', userId);
                
                if (clients) document.getElementById('total-clients').innerText = clients.length;
                if (sales) {
                    const total = sales.reduce((sum, s) => sum + parseFloat(s.value), 0);
                    document.getElementById('total-revenue').innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                }
            } catch (e) {
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
