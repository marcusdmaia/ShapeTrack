<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <main class="container">
        <div class="bento-grid">
            <!-- Header -->
            <div class="card-shell reveal" style="grid-column: span 12;">
                <div class="card-core">
                    <span class="eyebrow">Registro de Transação</span>
                    <h1 style="margin: 4px 0;">NOVA VENDA</h1>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Controle de consumo e fluxo de caixa premium.</p>
                </div>
            </div>

            <!-- Selection & Cart -->
            <div class="card-shell reveal" style="grid-column: span 8; animation-delay: 0.1s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg);"><i class="ph-bold ph-shopping-cart" style="color: var(--accent);"></i> CARRINHO ATIVO</h3>
                    
                    <div style="display: flex; flex-wrap: wrap; gap: var(--space-md); margin-bottom: var(--space-lg);">
                        <div class="form-group" style="flex: 1; min-width: 240px;">
                            <label>CLIENTE / PROTOCOLO</label>
                            <select id="select-client">
                                <option value="">SELECIONAR CLIENTE...</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 240px;">
                            <label>NÍVEL DE DESCONTO</label>
                            <select id="select-discount" onchange="renderCart(); setupSearch();">
                                <option value="consumer">PREÇO CHEIO (VENDA DIRETA)</option>
                                <option value="c25">CLIENTE PREMIUM / CONSULTOR (25%)</option>
                                <option value="c35">CONSULTOR SENIOR (35%)</option>
                                <option value="c42">PRODUTOR QUALIFICADO (42%)</option>
                                <option value="c50">SUPERVISOR (50%)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="position: relative;">
                        <label>BUSCAR ITEM (SKU/NOME)</label>
                        <input type="text" id="product-input" placeholder="DIGITE PARA BUSCAR...">
                        <div id="search-results" style="position: absolute; top: 100%; left: 0; right: 0; background: #0A0C0B; border: 1px solid var(--glass-border); border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; margin-top: 8px;"></div>
                    </div>

                    <div id="cart-list" style="margin-top: var(--space-xl);">
                        <div style="text-align: center; padding: 48px; border: 1px dashed var(--glass-border); border-radius: 20px; color: var(--text-secondary);">
                            CARRINHO DISPONÍVEL PARA INPUT
                        </div>
                    </div>
                </div>
            </div>

            <!-- Summary & Action -->
            <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.2s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg);"><i class="ph-bold ph-receipt" style="color: var(--accent);"></i> RESUMO</h3>
                    
                    <div style="background: rgba(255,255,255,0.02); padding: var(--space-lg); border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: var(--space-lg);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.8rem;">
                            <span>VOLUME TOTAL (PV)</span>
                            <span id="total-pv" style="color: #FFF; font-weight: 700;">0.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.8rem;">
                            <span>LUCRO ESTIMADO</span>
                            <span id="est-profit" style="color: #2ecc71; font-weight: 700;">R$ 0,00</span>
                        </div>
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 800; font-size: 1.2rem;">TOTAL</span>
                            <span id="total-price" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">R$ 0,00</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>PAGAMENTO</label>
                        <select id="payment-type" onchange="togglePartialPayment()">
                            <option value="total">PAGO INTEGRALMENTE</option>
                            <option value="partial">PAGAMENTO PARCIAL</option>
                            <option value="later">PAGAMENTO PENDENTE</option>
                        </select>
                    </div>

                    <div id="partial-fields" style="display: none;">
                        <div class="form-group">
                            <label>VALOR RECEBIDO (R$)</label>
                            <input type="number" id="amount-paid" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>VENCIMENTO DO SALDO</label>
                            <input type="date" id="due-date">
                        </div>
                    </div>

                    <button id="btn-finish" class="btn btn-primary" style="width: 100%; margin-top: var(--space-md);">
                        FINALIZAR VENDA
                        <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-check"></i></div>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="container" style="padding: var(--space-xl) var(--space-md); text-align: center; color: var(--text-secondary); font-size: 0.7rem; letter-spacing: 0.1em;">
        &copy; 2026 SHAPETRACK // HIGH-END PERFORMANCE ECOSYSTEM
    </footer>

    <script src="js/config.js?v=3.5"></script>
    <script>
        const products = [
            { sku: '1', name: 'SHAKE HERBALIFE', consumer: 195.00, c25: 146.25, c35: 126.75, c42: 113.10, c50: 97.50, pv: 23.95 },
            { sku: '2', name: 'CHÁ 100G', consumer: 210.00, c25: 157.50, c35: 136.50, c42: 121.80, c50: 105.00, pv: 34.95 },
            { sku: '3', name: 'NUTREV', consumer: 45.00, c25: 33.75, c35: 29.25, c42: 26.10, c50: 22.50, pv: 5.45 },
            { sku: '4', name: 'PROTEIN CRUNCH', consumer: 105.00, c25: 78.75, c35: 68.25, c42: 60.90, c50: 52.50, pv: 14.50 },
            { sku: '5', name: 'LIFTOFF', consumer: 115.00, c25: 86.25, c35: 74.75, c42: 66.70, c50: 57.50, pv: 12.95 }
        ];

        let cart = [];

        async function init() {
            const context = await App.init('vendas.html');
            if (!context) return;
            loadClients(context.session.user.id);
            setupSearch();
        }

        async function loadClients(userId) {
            const { data } = await sb.from('profiles').select('id, full_name').eq('mentor_id', userId).eq('role', 'client');
            if (data) {
                const select = document.getElementById('select-client');
                data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.full_name.toUpperCase();
                    select.appendChild(opt);
                });
            }
        }

        function setupSearch() {
            const input = document.getElementById('product-input');
            const results = document.getElementById('search-results');
            const discount = document.getElementById('select-discount').value;

            input.oninput = () => {
                const query = input.value.toLowerCase();
                if (!query) { results.style.display = 'none'; return; }
                const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.sku.includes(query));
                
                results.innerHTML = filtered.map(p => {
                    const price = p[discount] || p.consumer;
                    return `
                        <div style="padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);" onclick="addToCart('${p.sku}')">
                            <div style="font-size: 0.8rem; font-weight: 700; color: #FFF;">${p.name}</div>
                            <div style="font-size: 0.7rem; color: var(--accent); font-weight: 800; margin-top: 4px;">R$ ${price.toFixed(2)} | ${p.pv} PV</div>
                        </div>
                    `;
                }).join('');
                results.style.display = filtered.length ? 'block' : 'none';
            };
        }

        function addToCart(sku) {
            const product = products.find(p => p.sku === sku);
            const existing = cart.find(i => i.sku === sku);
            if (existing) existing.qty++; else cart.push({ ...product, qty: 1 });
            renderCart();
            document.getElementById('product-input').value = '';
            document.getElementById('search-results').style.display = 'none';
        }

        function renderCart() {
            const container = document.getElementById('cart-list');
            const discount = document.getElementById('select-discount').value;
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 48px; border: 1px dashed var(--glass-border); border-radius: 20px; color: var(--text-secondary);">CARRINHO VAZIO</div>';
                updateSummary(0, 0, 0); return;
            }
            let totalPV = 0, totalPrice = 0, totalCost = 0;
            container.innerHTML = cart.map(item => {
                const price = item[discount] || item.consumer;
                totalPV += item.pv * item.qty;
                totalPrice += price * item.qty;
                totalCost += item.c50 * item.qty;
                return `
                    <div style="display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px; margin-bottom: 12px;">
                        <div style="flex: 1; font-weight: 700; font-size: 0.85rem; color: #FFF;">${item.name} (${item.qty}x)</div>
                        <div style="font-weight: 800; color: var(--accent); font-size: 0.9rem;">R$ ${(price * item.qty).toFixed(2)}</div>
                        <div style="color: #ef4444; cursor: pointer;" onclick="removeFromCart('${item.sku}')"><i class="ph-bold ph-trash"></i></div>
                    </div>
                `;
            }).join('');
            updateSummary(totalPV, totalPrice, totalCost);
        }

        function removeFromCart(sku) {
            cart = cart.filter(i => i.sku !== sku);
            renderCart();
        }

        function updateSummary(pv, price, cost) {
            document.getElementById('total-pv').textContent = pv.toFixed(2);
            document.getElementById('total-price').textContent = `R$ ${price.toFixed(2)}`;
            const profit = price - cost;
            document.getElementById('est-profit').textContent = `R$ ${Math.max(0, profit).toFixed(2)}`;
        }

        function togglePartialPayment() {
            const type = document.getElementById('payment-type').value;
            document.getElementById('partial-fields').style.display = (type !== 'total') ? 'block' : 'none';
        }

        document.getElementById('btn-finish').onclick = async () => {
            const clientId = document.getElementById('select-client').value;
            if (!clientId) return showToast('Selecione um cliente', 'error');
            if (cart.length === 0) return showToast('Carrinho vazio', 'error');

            showToast('Venda registrada com sucesso!');
            setTimeout(() => window.location.href = 'crm_dashboard.html', 1500);
        };

        init();
    </script>
</body>
</html>
