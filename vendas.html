<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 class="page-title">Nova Venda</h1>
                <p style="color: var(--text-dim);">Registre o consumo e venda de produtos Herbalife.</p>
            </div>
        </header>

        <div class="grid-vendas">
            <!-- Left: Products -->
            <div class="card">
                <h2 class="section-title"><i class="fas fa-shopping-basket"></i> Itens no Carrinho</h2>
                
                <div class="grid-inputs" style="margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Cliente / Aluno</label>
                        <input type="text" id="client-search" placeholder="🔍 Filtrar cliente..." oninput="filterClientList()" style="margin-bottom: 8px;">
                        <select id="select-client">
                            <option value="">Selecione um cliente...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nível de Desconto</label>
                        <select id="select-discount">
                            <option value="consumer">Preço Cheio (Venda Direta)</option>
                            <option value="c25">Cliente Premium / Consultor (25%)</option>
                            <option value="c35">Consultor Senior (35%)</option>
                            <option value="c42">Produtor Qualificado (42%)</option>
                            <option value="c50">Supervisor (50%)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="position: relative;">
                    <label>Buscar Produto (Nome ou SKU)</label>
                    <input type="text" id="product-input" placeholder="Ex: Shake Baunilha, Protein Crunch...">
                    <div id="search-results" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; max-height: 300px; overflow-y: auto; display: none; margin-top: 5px;"></div>
                </div>

                <div id="cart-list" style="margin-top: 24px;">
                    <p style="text-align: center; color: var(--text-dim); padding: 40px;">Seu carrinho está vazio.</p>
                </div>

                <button onclick="toggleCustomProduct()" style="width: 100%; border: 2px dashed #e2e8f0; padding: 15px; border-radius: 12px; background: transparent; color: var(--text-dim); font-weight: 700; cursor: pointer; margin-top: 10px;">
                    <i class="fas fa-plus-circle"></i> Adicionar Produto Personalizado
                </button>

                <div id="custom-product-form" style="display: none; margin-top: 20px; background: #f8faf9; padding: 20px; border-radius: 16px;">
                    <div class="form-group"><label>Nome do Item</label><input type="text" id="custom-name"></div>
                    <div class="grid-inputs" style="margin-bottom: 10px;">
                        <div class="form-group"><label>Preço Venda (R$)</label><input type="number" id="custom-price" step="0.01"></div>
                        <div class="form-group"><label>Pontos (PV)</label><input type="number" id="custom-pv" step="0.1"></div>
                    </div>
                    <button class="btn btn-accent" onclick="addCustomItem()" style="width: 100%;">Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Right: Summary & Payment -->
            <div class="card">
                <h2 class="section-title"><i class="fas fa-receipt"></i> Resumo e Pagamento</h2>
                
                <div class="form-group">
                    <label>Forma de Pagamento</label>
                    <select id="payment-type" onchange="togglePartialPayment()">
                        <option value="total">Pago Integralmente</option>
                        <option value="partial">Pagamento Parcial (Entrada)</option>
                        <option value="later">Pagar Depois (Total Pendente)</option>
                    </select>
                </div>

                <div id="partial-fields" style="display: none;">
                    <div class="form-group">
                        <label>Valor Recebido Agora (R$)</label>
                        <input type="number" id="amount-paid" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Data para Saldo Devedor</label>
                        <input type="date" id="due-date">
                    </div>
                </div>

                <div class="form-group" style="background: #f0fdf4; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 24px;">
                    <i class="fas fa-coins" style="color: #16a34a; font-size: 1.2rem;"></i>
                    <div style="flex: 1;">
                        <span style="display: block; font-size: 0.75rem; color: #166534; font-weight: 700; text-transform: uppercase;">Lucro Estimado</span>
                        <div id="est-profit" style="font-size: 1.2rem; font-weight: 800; color: #166534;">R$ 0,00</div>
                    </div>
                </div>

                <div style="background: #f8faf9; padding: 20px; border-radius: 20px; margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-dim); font-weight: 600;">
                        <span>Itens:</span> <span id="total-items">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-dim); font-weight: 600;">
                        <span>Volume (PV):</span> <span id="total-pv">0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #e2e8f0; color: var(--primary); font-weight: 800; font-size: 1.3rem;">
                        <span>Total:</span> <span id="total-price">R$ 0,00</span>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 10px; background: #f8faf9; padding: 15px; border-radius: 12px; margin-bottom: 24px;">
                    <input type="checkbox" id="business-presented" style="width: 20px; height: 20px;">
                    <label style="margin-bottom: 0; text-transform: none;">Apresentei o Plano de Negócio?</label>
                </div>

                <button class="btn btn-primary" id="btn-finish" style="width: 100%; padding: 18px; font-size: 1.1rem;">Finalizar e Registrar Venda</button>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const products = [
            { sku: '1', name: 'Shake Herbalife (Vários Sabores)', consumer: 195.00, c25: 146.25, c35: 126.75, c42: 113.10, c50: 97.50, pv: 23.95 },
            { sku: '2', name: 'Chá 100g (Original/Limão)', consumer: 210.00, c25: 157.50, c35: 136.50, c42: 121.80, c50: 105.00, pv: 34.95 },
            { sku: '3', name: 'NutreV', consumer: 45.00, c25: 33.75, c35: 29.25, c42: 26.10, c50: 22.50, pv: 5.45 },
            { sku: '4', name: 'Protein Crunch', consumer: 105.00, c25: 78.75, c35: 68.25, c42: 60.90, c50: 52.50, pv: 14.50 },
            { sku: '5', name: 'Liftoff (Caixa 10 unid)', consumer: 115.00, c25: 86.25, c35: 74.75, c42: 66.70, c50: 57.50, pv: 12.95 }
        ];

        let cart = [];
        let allClients = [];

        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'vendas.html');

            loadClients();
            setupSearch();
        }

        async function loadClients() {
            const { data: clients } = await sb.from('profiles').select('id, full_name').eq('role', 'client');
            allClients = clients || [];
            renderClientOptions(allClients);
        }

        function renderClientOptions(list) {
            const select = document.getElementById('select-client');
            select.innerHTML = '<option value="">Selecione um cliente...</option>';
            list.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.full_name;
                select.appendChild(opt);
            });
        }

        function filterClientList() {
            const q = document.getElementById('client-search').value.toLowerCase();
            renderClientOptions(allClients.filter(c => c.full_name.toLowerCase().includes(q)));
        }

        function setupSearch() {
            const input = document.getElementById('product-input');
            const results = document.getElementById('search-results');
            input.addEventListener('input', () => {
                const q = input.value.toLowerCase();
                if (!q) { results.style.display = 'none'; return; }
                const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.sku.includes(q));
                results.innerHTML = filtered.map(p => `
                    <div style="padding: 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; hover: background: #f8faf9;" onclick="addToCart('${p.sku}')">
                        <div style="font-weight: 700; font-size: 0.9rem;">${p.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-dim);">R$ ${p.consumer.toFixed(2)} | ${p.pv} PV</div>
                    </div>
                `).join('');
                results.style.display = filtered.length ? 'block' : 'none';
            });
            document.addEventListener('click', (e) => { if (!e.target.closest('.form-group')) results.style.display = 'none'; });
        }

        function addToCart(sku) {
            const product = products.find(p => p.sku === sku);
            const existing = cart.find(i => i.sku === sku);
            if (existing) existing.qty++; else cart.push({ ...product, qty: 1 });
            renderCart();
            document.getElementById('product-input').value = '';
            document.getElementById('search-results').style.display = 'none';
        }

        function removeFromCart(sku) {
            cart = cart.filter(i => i.sku !== sku);
            renderCart();
        }

        function updateQty(sku, qty) {
            const item = cart.find(i => i.sku === sku);
            if (item) { item.qty = parseInt(qty) || 1; renderCart(); }
        }

        function renderCart() {
            const container = document.getElementById('cart-list');
            const discount = document.getElementById('select-discount').value;
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-dim); padding: 40px;">Seu carrinho está vazio.</p>';
                updateSummary(0,0,0,0); return;
            }
            let totalPV = 0, totalPrice = 0, totalCost = 0;
            container.innerHTML = cart.map(item => {
                const price = item.custom ? item.consumer : (item[discount] || item.consumer);
                totalPV += item.pv * item.qty;
                totalPrice += price * item.qty;
                totalCost += (item.custom ? price * 0.5 : item.c50) * item.qty;
                return `
                    <div class="cart-item" style="display: flex; align-items: center; gap: 15px; padding: 15px; background: #f8faf9; border-radius: 16px; margin-bottom: 12px;">
                        <div style="flex: 1; font-weight: 700; font-size: 0.9rem;">${item.name} ${item.custom ? '⭐' : ''}</div>
                        <input type="number" style="width: 60px; padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center;" value="${item.qty}" min="1" onchange="updateQty('${item.sku}', this.value)">
                        <div style="font-weight: 800; color: var(--primary);">R$ ${price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
                        <div style="color: #ef4444; cursor: pointer; padding: 8px;" onclick="removeFromCart('${item.sku}')"><i class="fas fa-trash"></i></div>
                    </div>
                `;
            }).join('');
            updateSummary(cart.length, totalPV, totalPrice, totalCost);
        }

        function updateSummary(items, pv, price, cost) {
            document.getElementById('total-items').textContent = items;
            document.getElementById('total-pv').textContent = pv.toFixed(2);
            document.getElementById('total-price').textContent = `R$ ${price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            const profit = price - cost;
            document.getElementById('est-profit').textContent = `R$ ${Math.max(0, profit).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }

        function toggleCustomProduct() {
            const f = document.getElementById('custom-product-form');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        function addCustomItem() {
            const name = document.getElementById('custom-name').value;
            const price = parseFloat(document.getElementById('custom-price').value);
            const pv = parseFloat(document.getElementById('custom-pv').value);
            if (!name || isNaN(price)) return alert('Dados inválidos');
            cart.push({ sku: 'CUSTOM-'+Date.now(), name, pv: pv||0, consumer: price, custom: true, qty: 1 });
            renderCart(); toggleCustomProduct();
        }

        function togglePartialPayment() {
            const type = document.getElementById('payment-type').value;
            document.getElementById('partial-fields').style.display = (type !== 'total') ? 'block' : 'none';
        }

        document.getElementById('btn-finish').onclick = async () => {
            const btn = document.getElementById('btn-finish');
            if (cart.length === 0) return alert('Carrinho vazio');
            const clientId = document.getElementById('select-client').value;
            if (!clientId) return alert('Selecione um cliente');

            btn.disabled = true; btn.textContent = 'Processando...';

            try {
                const { data: { session } } = await sb.auth.getSession();
                const total = parseFloat(document.getElementById('total-price').textContent.replace('R$ ', '').replace('.', '').replace(',', '.'));
                const type = document.getElementById('payment-type').value;

                const { error } = await sb.from('sales').insert([{
                    client_id: clientId, mentor_id: session.user.id,
                    total_price: total, total_pv: parseFloat(document.getElementById('total-pv').textContent),
                    payment_status: type === 'total' ? 'Pago' : (type === 'partial' ? 'Parcial' : 'Pendente'),
                    amount_paid: parseFloat(document.getElementById('amount-paid').value || 0),
                    due_date: document.getElementById('due-date').value || null,
                    discount_level: document.getElementById('select-discount').value,
                    items: cart, business_presented_at_sale: document.getElementById('business-presented').checked
                }]);

                if (error) throw error;
                alert('Venda registrada com sucesso!');
                window.location.href = 'crm_dashboard.html';
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.textContent = 'Finalizar e Registrar Venda'; }
        };

        document.getElementById('select-discount').onchange = renderCart;
        init();
    </script>
</body>
</html>
