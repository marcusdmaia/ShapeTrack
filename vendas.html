    <div class="bento-grid">

                <div class="selection-grid" style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;">
                    <div class="form-group">
                        <label>CLIENTE / PROTOCOLO</label>
                        <select id="select-client" style="background: rgba(255,255,255,0.02);">

                        </select>
                    </div>
                    <div class="form-group">
                        <label>NÍVEL DE DESCONTO</label>
                        <select id="select-discount" onchange="renderCart(); setupSearch();" style="background: rgba(255,255,255,0.02);">
                            <option value="consumer">PREÇO CHEIO (VENDA DIRETA)</option>
                            <option value="c14">CLIENTE PREMIUM BRONZE (14%)</option>
                            <option value="c23">CLIENTE PREMIUM PRATA (23%)</option>
                            <option value="c25">CONSULTOR (25%)</option>

                            <option value="c35">CONSULTOR SENIOR (35%)</option>
                            <option value="c42">PRODUTOR QUALIFICADO (42%)</option>
                            <option value="c50">SUPERVISOR (50%)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="position: relative;">
                    <label>BUSCAR ITEM (SKU/NOME)</label>
                    <input type="text" id="product-input" placeholder="DIGITE PARA BUSCAR...">
                    <div id="search-results" style="position: absolute; top: 100%; left: 0; right: 0; background: #0A0C0B; border: 1px solid var(--glass-border); border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; margin-top: 8px;"></div>
                </div>

                <div id="cart-list" class="st-list" style="margin-top: 32px;">
                    <div style="text-align: center; padding: 48px; border: 1px dashed var(--glass-border); border-radius: 20px; color: var(--text-secondary);">
                        CARRINHO DISPONÍVEL PARA INPUT
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary & Action -->
        <div class="card-shell reveal span-12" style="animation-delay: 0.2s;">
            <div class="card-core">
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-receipt" style="color: var(--accent);"></i> RESUMO</h3>
                
                <div style="background: rgba(255,255,255,0.02); padding: 24px; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.8rem;">
                        <span>VOLUME TOTAL (PV)</span>
                        <span id="total-pv" style="color: #FFF; font-weight: 700;">0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.8rem;">
                        <span>LUCRO ESTIMADO</span>
                        <span id="est-profit" style="color: #2ecc71; font-weight: 700;">R$ 0,00</span>
                    </div>
                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 800; font-size: 1.2rem;">TOTAL</span>
                        <span id="total-price" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">R$ 0,00</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>CONDIÇÃO DE PAGAMENTO</label>
                    <select id="payment-type" onchange="togglePartialPayment()" style="background: rgba(255,255,255,0.02);">
                        <option value="total">PAGO INTEGRALMENTE</option>
                        <option value="partial">PAGAMENTO PARCIAL</option>
                        <option value="later">PAGAMENTO PENDENTE</option>
                    </select>
                </div>

                <div id="partial-fields" style="display: none; animation: fadeInUp 0.5s var(--bezier);">
                    <div class="form-group">
                        <label>VALOR RECEBIDO (R$)</label>
                        <input type="number" id="amount-paid" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>DATA DE VENCIMENTO</label>
                        <input type="date" id="due-date">
                    </div>
                </div>

                <button id="btn-finish" class="btn btn-primary" style="width: 100%; margin-top: 24px;">
                    FINALIZAR VENDA
                    <div class="btn-icon"><i class="ph-light ph-check"></i></div>
                </button>
            </div>
        </div>
    </div>

        async function init() {
            const context = await App.init('vendas.html');
            if (!context) return;
            loadClients(context.session.user.id);
            setupSearch();
        }

        async function loadClients(mentorId) {
            const { data: clients } = await sb.from('profiles').select('id, full_name, discount_level').eq('mentor_id', mentorId).eq('role', 'client');
            allClients = clients || [];
            const select = document.getElementById('select-client');
            allClients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.full_name.toUpperCase();
                select.appendChild(opt);
            });

            select.addEventListener('change', () => {
                const client = allClients.find(c => c.id === select.value);
                if (client) {
                    const level = client.discount_level || 0;
                    // Mapear número de desconto para o ID do select no vendas.html
                    const map = { 0: 'consumer', 14: 'c14', 25: 'c25', 35: 'c35', 42: 'c42', 50: 'c50' };
                    document.getElementById('select-discount').value = map[level] || 'consumer';
                    renderCart();
                }
            });
        }

        function setupSearch() {
            const input = document.getElementById('product-input');
            const results = document.getElementById('search-results');
            const discount = document.getElementById('select-discount').value;

            input.oninput = () => {
                const query = input.value.toLowerCase();
                if (!query) { results.style.display = 'none'; return; }
                const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.sku.includes(query));
                
                results.innerHTML = filtered.map(p => {
                    const price = p[discount] || p.consumer;
                    const isDiscounted = price < p.consumer;
                    return `
                        <div class="st-item" style="padding: 12px 16px; cursor: pointer;" onclick="addToCart('${p.sku}')">
                            <div class="st-item-info">
                                <div class="st-item-title">${p.name}</div>
                                <div class="st-item-subtitle">${p.sku} | ${p.pv} PV</div>
                            </div>
                            <div class="st-item-meta">
                                <div class="st-item-value">R$ ${price.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                results.style.display = filtered.length ? 'block' : 'none';
            };
        }

        function addToCart(sku) {
            const product = products.find(p => p.sku === sku);
            const existing = cart.find(i => i.sku === sku);
            if (existing) existing.qty++; else cart.push({ ...product, qty: 1 });
            renderCart();
            document.getElementById('product-input').value = '';
            document.getElementById('search-results').style.display = 'none';
        }

        function renderCart() {
            const container = document.getElementById('cart-list');
            const discount = document.getElementById('select-discount').value;
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 48px; border: 1px dashed var(--glass-border); border-radius: 20px; color: var(--text-secondary);">CARRINHO DISPONÍVEL PARA INPUT</div>';
                updateSummary(0, 0, 0); return;
            }
            let totalPV = 0, totalPrice = 0, totalCost = 0;
            container.innerHTML = cart.map(item => {
                const price = item[discount] || item.consumer;
                const isDiscounted = price < item.consumer;
                totalPV += item.pv * item.qty;
                totalPrice += price * item.qty;
                totalCost += item.c50 * item.qty;
                window.currentSaleTotal = totalPrice; // Store for submission
                window.currentSalePV = totalPV;
                return `
                    <div class="st-item">
                        <div class="st-item-info">
                            <div class="st-item-title">${item.name}</div>
                            <div class="st-item-subtitle">${item.qty} UNIDADE(S) | ${item.pv * item.qty} PV</div>
                        </div>
                        <div class="st-item-meta">
                            <div class="st-item-value">R$ ${price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
                            ${isDiscounted ? `<div class="st-item-detail" style="text-decoration: line-through; opacity: 0.4;">R$ ${item.consumer.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>` : ''}
                        </div>
                        <div class="st-item-actions">
                            <button class="btn btn-danger" onclick="removeFromCart('${item.sku}')">
                                <i class="ph-light ph-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            updateSummary(totalPV, totalPrice, totalCost);
        }

        function removeFromCart(sku) {
            cart = cart.filter(i => i.sku !== sku);
            renderCart();
        }

        function updateSummary(pv, price, cost) {
            document.getElementById('total-pv').textContent = pv.toFixed(2);
            document.getElementById('total-price').textContent = `R$ ${price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            const profit = price - cost;
            document.getElementById('est-profit').textContent = `R$ ${Math.max(0, profit).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }

        function togglePartialPayment() {
            const type = document.getElementById('payment-type').value;
            document.getElementById('partial-fields').style.display = (type !== 'total') ? 'block' : 'none';
        }

        document.getElementById('btn-finish').onclick = async () => {
            const btn = document.getElementById('btn-finish');
            if (cart.length === 0) return showToast('Carrinho vazio', 'error');
            const clientId = document.getElementById('select-client').value;
            if (!clientId) return showToast('Selecione um cliente', 'error');

            btn.disabled = true;
            try {
                const total = window.currentSaleTotal || 0;
                const type = document.getElementById('payment-type').value;
                const { error } = await sb.from('sales').insert([{
                    client_id: clientId, mentor_id: App.profile.id,
                    total_price: total, total_pv: window.currentSalePV || 0,
                    payment_status: type === 'total' ? 'Pago' : (type === 'partial' ? 'Parcial' : 'Pendente'),
                    amount_paid: parseFloat(document.getElementById('amount-paid').value || 0),
                    due_date: document.getElementById('due-date').value || null,
                    discount_level: document.getElementById('select-discount').value,
                    items: cart
                }]);
                if (error) throw error;
                showToast('Venda registrada com sucesso!');
                setTimeout(() => window.location.href = 'crm_dashboard.html', 1500);
            } catch (err) { showToast(err.message, 'error'); } finally { btn.disabled = false; }
        };

        // Removed redundant onchange assignment as it's already in the HTML
        init();
    </script>
</body>
</html>
