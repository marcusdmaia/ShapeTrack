<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShapeTrack // Premium Mentorship Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
    <style>
        body {
            background: #050807;
            overflow: hidden;
        }
        .login-page {
            display: flex;
            min-height: 100dvh;
            background: url('login_bg_performance_1777734357298.png') center/cover no-repeat;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .login-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(5, 8, 7, 0.4) 0%, rgba(5, 8, 7, 0.95) 100%);
            backdrop-filter: blur(10px);
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            margin: 24px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 3.5rem;
            letter-spacing: -2px;
            line-height: 0.9;
            color: #FFF;
        }
        .login-header span {
            color: var(--accent);
            display: block;
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-top: 8px;
            font-weight: 300;
        }
        .login-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 100px;
            margin-bottom: 32px;
            border: 1px solid var(--glass-border);
            position: relative;
        }
        .login-tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.4s var(--bezier);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-tab.active {
            background: var(--accent);
            color: #FFF;
            box-shadow: 0 8px 20px var(--accent-glow);
        }
        .login-tab i { font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="login-card">
            <div class="login-header reveal">
                <h1 id="brand-title">SHAPETRACK</h1>
                <span id="brand-subtitle">PREMIUM MENTORSHIP</span>
            </div>

            <div class="card-shell reveal" style="animation-delay: 0.2s;">
                <div class="card-core">
                    
                    <div class="login-tabs">
                        <div class="login-tab active" data-role="mentor" onclick="switchTab(this)">
                            <i class="ph-fill ph-briefcase"></i> MENTOR
                        </div>
                        <div class="login-tab" data-role="client" onclick="switchTab(this)">
                            <i class="ph-fill ph-user"></i> ALUNO
                        </div>
                    </div>

                    <div id="login-context" style="margin-bottom: 32px;">
                        <h2 id="login-title" style="margin-bottom: 8px; font-size: 1.2rem;">ACESSO MENTOR</h2>
                        <p id="login-desc" style="color: var(--text-secondary); font-size: 0.8rem;">Área restrita para gestão de protocolos e alunos.</p>
                    </div>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label>E-MAIL DE ACESSO</label>
                            <input type="email" id="email" placeholder="seu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>CHAVE DE ACESSO</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 12px; height: 58px; font-size: 0.85rem;">
                            AUTENTICAR MENTOR
                            <div class="btn-icon"><i class="ph-fill ph-shield-check"></i></div>
                        </button>
                    </form>
                    
                    <div style="margin-top: 24px; text-align: center; display: flex; flex-direction: column; gap: 12px;">
                        <a href="recuperar_senha.html" style="color: var(--text-secondary); font-size: 0.65rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px;">Esqueceu sua chave de acesso?</a>
                        <div id="register-link-container">
                            <a href="cadastro_mentor.html" id="register-link" style="color: var(--accent); font-size: 0.75rem; text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Quero ser um Mentor</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=4.5"></script>
    <script>
        let selectedRole = 'mentor';

        function switchTab(el) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            selectedRole = el.dataset.role;

            const title = document.getElementById('login-title');
            const desc = document.getElementById('login-desc');
            const btn = document.getElementById('login-btn');
            const regLink = document.getElementById('register-link');

            if (selectedRole === 'mentor') {
                title.textContent = 'ACESSO MENTOR';
                desc.textContent = 'Área restrita para gestão de protocolos e alunos.';
                btn.innerHTML = 'AUTENTICAR MENTOR <div class="btn-icon"><i class="ph-fill ph-shield-check"></i></div>';
                regLink.textContent = 'Quero ser um Mentor';
                regLink.href = 'cadastro_mentor.html';
            } else {
                title.textContent = 'ACESSO ALUNO';
                desc.textContent = 'Acompanhe seu progresso, treinos e evoluções.';
                btn.innerHTML = 'ENTRAR NO MEU PERFIL <div class="btn-icon"><i class="ph-fill ph-user-focus"></i></div>';
                regLink.textContent = 'Não tem conta? Cadastre-se';
                regLink.href = 'cadastro_aluno.html';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.innerHTML = 'VERIFICANDO... <div class="btn-icon"><i class="ph-fill ph-spinner ph-spin"></i></div>';

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                switchTab(document.querySelector(`.login-tab[data-role="${selectedRole}"]`));
            } else {
                showToast('Acesso Autorizado. Carregando seu perfil...', 'success');
                
                sessionStorage.setItem('logging_in', 'true');
                
                // Fetch profile to decide where to go
                const context = await App.init();
                const profile = context ? context.profile : null;
                
                setTimeout(() => {
                    sessionStorage.removeItem('logging_in');
                    if (profile && profile.role === 'aluno') {
                        window.location.href = 'relatorio.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);
            }
        });

        // Check session and auto-redirect
        async function checkSession() {
            // Se já estivermos processando um login, não faça nada
            if (sessionStorage.getItem('logging_in')) return;

            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                const context = await App.init();
                if (context && context.profile) {
                    const destination = context.profile.role === 'aluno' ? 'relatorio.html' : 'dashboard.html';
                    // Só redireciona se não estivermos já na página de destino
                    if (!window.location.pathname.endsWith(destination)) {
                        window.location.href = destination;
                    }
                }
            }
        }
        checkSession();
    </script>
</body>
</html>
