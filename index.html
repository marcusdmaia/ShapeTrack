<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShapeTrack | Premium Mentorship</title>
    <!-- SEO & Social Media Meta Tags -->
    <meta name="description" content="Plataforma de mentoria fitness premium. Acompanhe sua evolução e alcance sua melhor versão.">
    <meta property="og:title" content="ShapeTrack | Sua Melhor Versão">
    <meta property="og:description" content="Acesse sua área de aluno e acompanhe sua evolução física.">
    <meta property="og:image" content="https://xsgjttyrxhwmtxlvbdoa.supabase.co/storage/v1/object/public/assets/og-image.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#2F5948">
    <link rel="icon" type="image/png" href="https://xsgjttyrxhwmtxlvbdoa.supabase.co/storage/v1/object/public/assets/favicon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f5; /* Fundo clínico/clean */
            --card-bg: #ffffff;
            --primary-color: #2F5948; /* Verde ShapeHouse */
            --accent-color: #D96C2B; /* Laranja ShapeHouse */
            --text-main: #1a1a1a;
            --text-dim: #666666;
            --error-color: #e63946;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .logo span {
            color: var(--accent-color);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        input {
            width: 100%;
            padding: 14px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(47, 89, 72, 0.1);
            background: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(47, 89, 72, 0.2);
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #234538;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(47, 89, 72, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-links {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            transition: 0.2s;
        }

        .btn-google:hover {
            background: #f5f5f5;
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: #ccc;
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        #message {
            margin-top: 15px;
            font-size: 0.85rem;
            min-height: 20px;
        }

        .error { color: var(--error-color); }
        .success { color: var(--primary-color); font-weight: 600; }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(47, 89, 72, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">SHAPE<span>TRACK</span></div>
    <p class="subtitle">Acesse sua plataforma de mentoria</p>

    <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" id="loginBtn">Entrar</button>
    <div id="loader" class="loader"></div>
    
    <div id="message"></div>

    <div class="footer-links">
        <a href="recuperar_senha.html" style="margin-bottom: 10px; display: block;">Esqueci minha senha</a>
        <span>Ainda não tem conta? <a href="#">Fale com seu mentor</a></span>
    </div>
</div>

<script>
    // Configurações do Supabase (Capturadas pelo Antigravity)
    const SUPABASE_URL = 'https://xsgjttyrxhwmtxlvbdoa.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU';

    // Usando um nome diferente para a variável para não dar conflito
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            window.location.href = 'dashboard.html';
        }
    }
    checkSession();

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const messageDiv = document.getElementById('message');
    const loader = document.getElementById('loader');

    loginBtn.addEventListener('click', async () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if (!email || !password) {
            showMessage('Preencha todos os campos', 'error');
            return;
        }

        setLoading(true);
        showMessage('', '');
        
        try {
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            setLoading(false);

            if (error) {
                showMessage('Erro: ' + error.message, 'error');
                console.error(error);
            } else {
                showMessage('Login realizado! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        } catch (err) {
            setLoading(false);
            showMessage('Erro inesperado de conexão.', 'error');
            console.error(err);
        }
    });

    function showMessage(msg, type) {
        messageDiv.textContent = msg;
        messageDiv.className = type;
    }

    function setLoading(isLoading) {
        if (isLoading) {
            loginBtn.style.display = 'none';
            loader.style.display = 'block';
        } else {
            loginBtn.style.display = 'block';
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
