<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <main style="display: flex; align-items: center; justify-content: center; padding: var(--space-xl) var(--space-md);">
        <div class="card-shell reveal" style="width: 100%; max-width: 450px;">
            <div class="card-core" style="text-align: center;">
                <div class="nav-logo" style="font-size: 2rem; margin-bottom: var(--space-xl);">SHAPE<span>TRACK</span></div>
                
                <h2 style="margin-bottom: var(--space-md);">BEM-VINDO</h2>
                <p style="color: var(--text-secondary); margin-bottom: var(--space-xl); font-size: var(--font-size-sm);">INSIRA SUAS CREDENCIAIS PARA ACESSAR O ECOSSISTEMA.</p>

                <form id="login-form">
                    <div class="form-group" style="text-align: left;">
                        <label>E-MAIL CORPORATIVO</label>
                        <input type="email" id="email" placeholder="nome@exemplo.com" required>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label>SENHA DE ACESSO</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-md);">
                        ENTRAR NO SISTEMA
                        <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-arrow-right"></i></div>
                    </button>
                </form>

                <div style="margin-top: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-sm);">
                    <a href="recuperar_senha.html" style="font-size: var(--font-size-sm); color: var(--text-secondary); text-decoration: underline;">Esqueceu sua senha?</a>
                    <a href="cadastro_aluno.html" style="font-size: var(--font-size-sm); color: var(--accent); font-weight: 700;">Criar nova conta de aluno</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js?v=3.5"></script>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerText = 'AUTENTICANDO...';

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerText = 'ENTRAR NO SISTEMA';
            } else {
                showToast('Acesso concedido. Bem-vindo de volta!');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            }
        };

        // Check if already logged in
        sb.auth.getSession().then(({data: {session}}) => {
            if (session) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
