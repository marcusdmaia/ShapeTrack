<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShapeTrack // Premium Mentorship Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
    <style>
        body {
            background: #050807;
            overflow: hidden;
        }
        .login-page {
            display: flex;
            min-height: 100dvh;
            background: url('login_bg_performance_1777734357298.png') center/cover no-repeat;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .login-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(5, 8, 7, 0.4) 0%, rgba(5, 8, 7, 0.95) 100%);
            backdrop-filter: blur(10px);
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            margin: 24px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 3.5rem;
            letter-spacing: -2px;
            line-height: 0.9;
            color: #FFF;
        }
        .login-header span {
            color: var(--accent);
            display: block;
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-top: 8px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="login-card">
            <div class="login-header reveal">
                <h1>SHAPETRACK</h1>
                <span>PREMIUM MENTORSHIP</span>
            </div>

            <div class="card-shell reveal" style="animation-delay: 0.2s;">
                <div class="card-core">
                    <h2 style="margin-bottom: 8px; font-size: 1.2rem;">AUTENTICAÇÃO</h2>
                    <p style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 32px;">Insira suas credenciais para acessar o ecossistema.</p>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label>E-MAIL CORPORATIVO</label>
                            <input type="email" id="email" placeholder="nome@exemplo.com" required>
                        </div>
                        <div class="form-group">
                            <label>CHAVE DE ACESSO</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px; height: 54px; font-size: 0.85rem;">
                            ENTRAR NO SISTEMA
                            <div class="btn-icon"><i class="ph-fill ph-shield-check"></i></div>
                        </button>
                    </form>
                    
                    <div style="margin-top: 32px; text-align: center;">
                        <a href="recuperar_senha.html" style="color: var(--text-secondary); font-size: 0.7rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-secondary)'">Esqueceu sua chave de acesso?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3.9"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Acesso Autorizado');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            }
        });

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        }
        checkSession();
    </script>
</body>
</html>
