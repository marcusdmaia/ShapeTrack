<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShapeTrack | Login</title>
    
    <meta name="description" content="Plataforma de mentoria fitness premium. Acompanhe sua evolução e alcance sua melhor versão.">
    <meta property="og:title" content="ShapeTrack | Sua Melhor Versão">
    <meta property="og:description" content="Acesse sua área de aluno e acompanhe sua evolução física.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#2F5948">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8faf9;
            --primary: #2F5948;
            --primary-light: #3d755e;
            --accent: #D96C2B;
            --text-main: #1a1c1b;
            --text-dim: #64748b;
            --white: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            background: linear-gradient(135deg, #f8faf9 0%, #edf2f0 100%);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            padding: 56px 40px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255,255,255,0.7);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1.8px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .logo span { color: var(--accent); }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(47, 89, 72, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(47, 89, 72, 0.2);
        }

        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(47, 89, 72, 0.3);
        }

        .footer-links {
            margin-top: 32px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        #message {
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 20px;
        }

        .error { color: #dc2626; }
        .success { color: #059669; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 48px 24px; border-radius: 24px; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">SHAPE<span>TRACK</span></div>
    <p class="subtitle">Sua jornada de evolução começa aqui.</p>

    <div class="form-group">
        <label>E-mail de acesso</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
    </div>

    <div class="form-group">
        <label>Sua senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button class="btn-login" id="loginBtn">Acessar Plataforma</button>
    
    <div id="message"></div>

    <div class="footer-links">
        <a href="recuperar_senha.html">Esqueceu a senha?</a>
        <p style="color: var(--text-dim)">Não possui conta? <a href="#">Fale com seu mentor</a></p>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
    }
    checkSession();

    const loginBtn = document.getElementById('loginBtn');
    const msg = document.getElementById('message');

    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
            msg.innerHTML = '<span class="error">Preencha todos os campos.</span>';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Entrando...';
        msg.innerHTML = '';
        
        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
            msg.innerHTML = `<span class="error">Erro: ${error.message}</span>`;
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Acessar Plataforma';
        } else {
            msg.innerHTML = '<span class="success">Login realizado! Redirecionando...</span>';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        }
    });
</script>

</body>
</html>   }
</script>

</body>
</html>
