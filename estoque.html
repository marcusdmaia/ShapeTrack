<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque // ShapeTrack Simple</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.1">
    <style>
        .inventory-table {
            width: 100%;
            border-collapse: collapse;
        }
        .inventory-table th {
            text-align: left;
            padding: 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.02);
        }
        .inventory-table td {
            padding: 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .inventory-table tr:hover { background: rgba(255,255,255,0.01); }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.03);
            color: #FFF;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .qty-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .qty-val { font-size: 1.1rem; font-weight: 800; min-width: 35px; text-align: center; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-low { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; }
        .badge-ok { background: rgba(47, 89, 72, 0.1); color: var(--accent); }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .inventory-table th:nth-child(3), 
            .inventory-table td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="container" style="padding-top: 80px; padding-bottom: 120px;">
        
        <div class="header-section reveal">
            <div>
                <h1 class="premium-title">ESTOQUE <span class="text-gradient">SIMPLIFICADO</span></h1>
                <p class="premium-subtitle">Gestão de produtos e empréstimos em lista única.</p>
            </div>
            <button class="btn btn-primary" onclick="openLoanModal()">
                <i class="ph-bold ph-hand-coins"></i> NOVO EMPRÉSTIMO
            </button>
        </div>

        <!-- Search Bar -->
        <div class="card-shell reveal" style="margin-bottom: 32px;">
            <div class="card-core" style="padding: 12px 16px;">
                <div style="position: relative;">
                    <i class="ph ph-magnifying-glass" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                    <input type="text" id="stock-search" placeholder="BUSCAR POR PRODUTO OU SKU..." style="padding-left: 48px; border: none; background: transparent;" oninput="filterStock()">
                </div>
            </div>
        </div>

        <!-- Inventory List -->
        <div class="section-title reveal">
            <i class="ph-fill ph-package"></i> LISTA DE PRODUTOS
        </div>
        
        <div class="card-shell reveal">
            <div class="card-core" style="padding: 0; overflow: hidden;">
                <div style="overflow-x: auto;">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>PRODUTO / SKU</th>
                                <th>QUANTIDADE</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="stock-list">
                            <!-- Items loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Borrowed Items Section -->
        <div class="section-title reveal" style="margin-top: 60px;">
            <i class="ph-fill ph-hand-coins"></i> PRODUTOS EMPRESTADOS (OBS)
        </div>

        <div class="card-shell reveal">
            <div class="card-core" style="padding: 0; overflow-x: auto;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>QUEM / PRODUTO</th>
                            <th style="text-align: center;">QTD</th>
                            <th style="text-align: center;">DATA</th>
                            <th style="text-align: center;">AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody id="loan-list">
                        <!-- Loans loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Loan Modal -->
    <div id="loan-modal" class="modal">
        <div class="card-shell" style="width: 90%; max-width: 400px;">
            <div class="card-core">
                <h2 style="margin-bottom: 24px; text-align: center;">REGISTRAR EMPRÉSTIMO</h2>
                <div class="form-group">
                    <label>NOME DO RECEPTOR</label>
                    <input type="text" id="loan_borrower" placeholder="EX: JOÃO SILVA">
                </div>
                <div class="form-group">
                    <label>PRODUTO</label>
                    <select id="loan_sku" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #FFF; padding: 14px; border-radius: 12px; width: 100%;">
                        <!-- Populated via JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>QUANTIDADE</label>
                    <input type="number" id="loan_qty" value="1" min="1">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px;">
                    <button class="btn btn-secondary" onclick="closeLoanModal()">CANCELAR</button>
                    <button class="btn btn-primary" onclick="submitLoan()">CONFIRMAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3.1"></script>
    <script>
        const products_ref = [
            { "sku": "148K", "name": "BCAA 5:1:1 204G TABLETES" },
            { "sku": "1923", "name": "BEAUTY BOOSTER COLÁGENO 240G" },
            { "sku": "1445", "name": "CR7 DRIVE BARRY MIX" },
            { "sku": "325K", "name": "CREATINA 150G" },
            { "sku": "497K", "name": "FIBER CONCENTRATE LIMÃO E MEL" },
            { "sku": "498K", "name": "FIBER CONCENTRATE MANGA" },
            { "sku": "496K", "name": "FIBER CONCENTRATE UVA" },
            { "sku": "0927", "name": "FIBER POWDER" },
            { "sku": "146K", "name": "GLUTAMINA 150G" },
            { "sku": "061K", "name": "HERBAL CONCENTRATE 102G - CANELA" },
            { "sku": "062K", "name": "HERBAL CONCENTRATE 102G - LARANJA" },
            { "sku": "059K", "name": "HERBAL CONCENTRATE 102G - ORIGINAL" },
            { "sku": "004K", "name": "HERBAL CONCENTRATE 357G - ORIGINAL" },
            { "sku": "063K", "name": "HERBAL CONCENTRATE 51G - LIMÃO" },
            { "sku": "060K", "name": "HERBAL CONCENTRATE 51G - ORIGINAL" },
            { "sku": "0065", "name": "HERBALIFELINE" },
            { "sku": "190K", "name": "LIFTOFF AMORA INTENSO (15UN)" },
            { "sku": "371K", "name": "LIFTOFF LIMÃO ABACAXI (15UN)" },
            { "sku": "317K", "name": "LIFTOFF LIMÃO SICILIANO (15UN)" },
            { "sku": "3122", "name": "MULTIVITAMINAS E MINERAIS" },
            { "sku": "056K", "name": "N-R-G. PÓ 100G - GUARANÁ TROPICAL" },
            { "sku": "057K", "name": "N-R-G. PÓ 100G - ORIGINAL" },
            { "sku": "003K", "name": "N-R-G. PÓ 330G - GUARANÁ TROPICAL" },
            { "sku": "058K", "name": "N-R-G. PÓ 60G - ORIGINAL" },
            { "sku": "1639", "name": "NUTREV" },
            { "sku": "306B", "name": "NUTREV (10UN)" },
            { "sku": "395K", "name": "NUTRI SOUP 416G - FRANGO COM LEGUMES" },
            { "sku": "223K", "name": "ONACTIVE DRINK CHOCOLATE (264G)" },
            { "sku": "040K", "name": "PROTEIN CRUNCH CHOCOLATE" },
            { "sku": "535K", "name": "PROTEIN ICE CREAM BAUNILHA" },
            { "sku": "534K", "name": "PROTEIN ICE CREAM CHOCOLATE" },
            { "sku": "214K", "name": "PROTEÍNA EM BARRAS BAUNILHA (7UN)" },
            { "sku": "0031", "name": "PROTEÍNA EM BARRAS LIMÃO (7UN)" },
            { "sku": "0242", "name": "PROTEÍNA EM PÓ 240G" },
            { "sku": "0246", "name": "PROTEÍNA EM PÓ 480G" },
            { "sku": "326K", "name": "SHAKE BANANA CARAMELIZADA" },
            { "sku": "0951", "name": "SHAKE BAUNILHA CREMOSO" },
            { "sku": "2129", "name": "SHAKE BAUNILHA CREMOSO EMB. ECONÔMICA" },
            { "sku": "3144", "name": "SHAKE CHOCOLATE SENSATION" },
            { "sku": "387K", "name": "SHAKE CHOCOLATE SENSATION (GRANDE)" },
            { "sku": "295K", "name": "SHAKE COOKIES AND CREAM" },
            { "sku": "0930", "name": "SHAKE DE COCO" },
            { "sku": "0940", "name": "SHAKE DOCE DE LEITE" },
            { "sku": "2122", "name": "SHAKE DOCE DE LEITE EMB. ECONÔMICA" },
            { "sku": "249K", "name": "SHAKE FRAPÊ DE ABACAXI" },
            { "sku": "0953", "name": "SHAKE MORANGO CREMOSO" },
            { "sku": "1446", "name": "SHAKE MORANGO CREMOSO EMB. ECONÔMICA" },
            { "sku": "447K", "name": "SHAKE PISTACHE" },
            { "sku": "0948", "name": "SHAKE SACHÊ BAUNILHA (7UN)" },
            { "sku": "439K", "name": "SHAKE TORTA DE LIMÃO" },
            { "sku": "318K", "name": "SHAPE CONTROL - 30 CÁPSULAS" },
            { "sku": "445K", "name": "SOPA SACHÊ CREME DE CEBOLA (7UN)" },
            { "sku": "448K", "name": "SOPA SACHÊ FRANGO COM LEGUMES (7UN)" },
            { "sku": "1417", "name": "TRI-CORE PROTEIN BLEND CHOCOLATE" },
            { "sku": "191K", "name": "WHEY PROTEIN 3W BAUNILHA 510G" },
            { "sku": "147K", "name": "WHEY PROTEIN 3W CHOCOLATE 510G" },
            { "sku": "0020", "name": "XTRA-CAL" }
        ];

        let inventory = [];
        let loans = [];
        let searchTerm = '';

        async function init() {
            const res = await App.init('estoque.html');
            if(!res) return;
            await loadData();
            populateProductSelect();
        }

        async function loadData() {
            const { data: invData } = await sb.from('inventory').select('*').eq('mentor_id', App.profile.id);
            inventory = invData || [];

            products_ref.forEach(p => {
                if(!inventory.find(i => i.sku === p.sku)) {
                    inventory.push({ sku: p.sku, product_name: p.name, quantity: 0, min_threshold: 3, mentor_id: App.profile.id });
                }
            });

            const { data: loanData } = await sb.from('loans').select('*').eq('mentor_id', App.profile.id).order('borrow_date', { ascending: false });
            loans = loanData || [];

            renderInventory();
            renderLoans();
        }

        function filterStock() {
            searchTerm = document.getElementById('stock-search').value.toLowerCase();
            renderInventory();
        }

        function renderInventory() {
            const container = document.getElementById('stock-list');
            const filtered = inventory.filter(i => 
                i.product_name.toLowerCase().includes(searchTerm) || 
                i.sku.toLowerCase().includes(searchTerm)
            );

            container.innerHTML = filtered.map(item => {
                const isLow = item.quantity <= item.min_threshold && item.quantity > 0;
                return `
                    <tr>
                        <td>
                            <div style="font-weight: 700; font-size: 0.85rem;">${item.product_name}</div>
                            <div style="font-size: 0.6rem; color: var(--text-secondary);">SKU: ${item.sku}</div>
                        </td>
                        <td>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="updateQty('${item.sku}', -1)"><i class="ph ph-minus"></i></button>
                                <div class="qty-val">${item.quantity}</div>
                                <button class="qty-btn" onclick="updateQty('${item.sku}', 1)"><i class="ph ph-plus"></i></button>
                            </div>
                        </td>
                        <td>
                            <span class="badge ${isLow ? 'badge-low' : 'badge-ok'}">${isLow ? 'BAIXO' : 'OK'}</span>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="3" style="text-align: center; padding: 40px; color: var(--text-secondary);">NADA ENCONTRADO</td></tr>';
        }

        async function updateQty(sku, delta) {
            const item = inventory.find(i => i.sku === sku);
            const newQty = Math.max(0, item.quantity + delta);
            item.quantity = newQty;
            renderInventory();

            await sb.from('inventory').upsert([{ 
                mentor_id: App.profile.id, 
                sku: sku, 
                product_name: item.product_name, 
                quantity: newQty, 
                min_threshold: item.min_threshold 
            }], { onConflict: 'mentor_id,sku' });
        }

        function renderLoans() {
            const container = document.getElementById('loan-list');
            container.innerHTML = loans.map(loan => `
                <tr>
                    <td>
                        <div style="font-weight: 700;">${loan.borrower_name}</div>
                        <div style="font-size: 0.65rem; color: var(--text-secondary);">${loan.product_name}</div>
                    </td>
                    <td style="text-align: center; font-weight: 800;">${loan.quantity}</td>
                    <td style="text-align: center; font-size: 0.75rem; color: var(--text-secondary);">${new Date(loan.borrow_date).toLocaleDateString('pt-BR')}</td>
                    <td style="text-align: center;">
                        ${loan.status === 'borrowed' ? `
                            <button class="btn" style="padding: 4px 10px; font-size: 0.65rem;" onclick="returnItem('${loan.id}', '${loan.sku}', ${loan.quantity})">
                                BAIXA
                            </button>
                        ` : '<i class="ph-fill ph-check-circle" style="color: var(--accent);"></i>'}
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="4" style="text-align: center; padding: 30px; color: var(--text-secondary);">SEM EMPRÉSTIMOS</td></tr>';
        }

        function populateProductSelect() {
            const select = document.getElementById('loan_sku');
            select.innerHTML = products_ref.map(p => `<option value="${p.sku}">${p.name}</option>`).join('');
        }

        function openLoanModal() { document.getElementById('loan-modal').classList.add('active'); }
        function closeLoanModal() { document.getElementById('loan-modal').classList.remove('active'); }

        async function submitLoan() {
            const borrower = document.getElementById('loan_borrower').value;
            const sku = document.getElementById('loan_sku').value;
            const qty = parseInt(document.getElementById('loan_qty').value);
            const product = products_ref.find(p => p.sku === sku);

            if(!borrower || !qty) return showToast('CAMPOS OBRIGATÓRIOS', 'error');

            await sb.from('loans').insert([{
                mentor_id: App.profile.id,
                borrower_name: borrower,
                sku: sku,
                product_name: product.name,
                quantity: qty,
                borrow_date: new Date().toISOString(),
                status: 'borrowed'
            }]);

            await updateQty(sku, -qty);
            showToast('EMPRÉSTIMO OK');
            closeLoanModal();
            loadData();
        }

        async function returnItem(loanId, sku, qty) {
            await sb.from('loans').update({ status: 'returned' }).eq('id', loanId);
            await updateQty(sku, qty);
            showToast('DEVOLVIDO');
            loadData();
        }

        init();
    </script>
</body>
</html>
