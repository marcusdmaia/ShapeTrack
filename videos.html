<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
            <div>
                <h1 class="page-title">Minha Biblioteca</h1>
                <p style="color: var(--text-dim);">Gerencie seus conteúdos e colaborações.</p>
            </div>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="fas fa-plus-circle"></i> Adicionar Vídeo
            </button>
        </header>

        <div id="video-grid" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
            <!-- Vídeos -->
        </div>
    </main>

    <!-- Add Modal -->
    <div id="addModal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-card">
            <h2 class="modal-title">Novo Vídeo</h2>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Título</label>
                <input type="text" id="v-title" placeholder="Ex: Treino de Superiores" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Link do YouTube</label>
                <input type="text" id="v-url" placeholder="https://youtube.com/watch?v=..." style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; background: #f8faf9; padding: 15px; border-radius: 12px; margin-bottom: 24px;">
                <input type="checkbox" id="v-colab" style="width: 20px; height: 20px; cursor: pointer;">
                <label style="margin-bottom: 0; text-transform: none; cursor: pointer;">Disponibilizar para colaboração?</label>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveVideo()">Salvar Vídeo</button>
            </div>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="playerModal" class="modal" onclick="closePlayer()">
        <div style="width: 100%; max-width: 900px; aspect-ratio: 16/9; background: black; border-radius: 16px; overflow: hidden; position: relative;">
            <iframe id="videoIframe" width="100%" height="100%" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let allVideos = [];

        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'videos.html');

            loadVideos(session.user.id);
        }

        async function loadVideos(mentorId) {
            const { data: videos } = await sb.from('videos').select('*').eq('mentor_id', mentorId);
            allVideos = videos || [];
            renderVideos(allVideos);
        }

        function renderVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = videos.length ? '' : '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-dim);">Nenhum vídeo cadastrado.</div>';

            videos.forEach(v => {
                const ytId = v.youtube_url.includes('v=') ? v.youtube_url.split('v=')[1].split('&')[0] : v.youtube_url.split('/').pop();
                const card = document.createElement('div');
                card.className = 'card video-card';
                card.style.padding = '0';
                card.style.overflow = 'hidden';
                card.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 16/9; background: url('https://img.youtube.com/vi/${ytId}/mqdefault.jpg') center/cover; position: relative; cursor: pointer;" onclick="openPlayer('${ytId}')">
                        <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
                            <i class="fas fa-play" style="font-size: 3rem; color: white;"></i>
                        </div>
                    </div>
                    <div style="padding: 20px;">
                        <h4 style="font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 12px;">${v.title}</h4>
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 700; color: ${v.is_colab ? '#27ae60' : 'var(--text-dim)'}; margin-bottom: 16px;">
                            <i class="fas fa-share-alt"></i> ${v.is_colab ? 'Disponível para Parcerias' : 'Privado (Apenas Alunos)'}
                        </div>
                        <div style="display: flex; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                            <button class="btn btn-outline" style="flex: 1; font-size: 0.8rem; padding: 10px;" onclick="toggleColab('${v.id}', ${v.is_colab})">Alternar Colab</button>
                            <button class="btn btn-outline" style="color: #ef4444; border-color: #ef4444; padding: 10px;" onclick="deleteVideo('${v.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function saveVideo() {
            const { data: { session } } = await sb.auth.getSession();
            const title = document.getElementById('v-title').value;
            const url = document.getElementById('v-url').value;
            const colab = document.getElementById('v-colab').checked;
            if (!title || !url) return alert('Preencha os campos!');

            await sb.from('videos').insert([{ mentor_id: session.user.id, title, youtube_url: url, is_colab: colab }]);
            closeModal(); 
            loadVideos(session.user.id);
        }

        async function toggleColab(id, current) {
            const { data: { session } } = await sb.auth.getSession();
            await sb.from('videos').update({ is_colab: !current }).eq('id', id);
            loadVideos(session.user.id);
        }

        async function deleteVideo(id) {
            const { data: { session } } = await sb.auth.getSession();
            if (confirm('Excluir este vídeo?')) {
                await sb.from('videos').delete().eq('id', id);
                loadVideos(session.user.id);
            }
        }

        function openPlayer(ytId) {
            document.getElementById('videoIframe').src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
            document.getElementById('playerModal').style.display = 'flex';
        }
        function closePlayer() {
            document.getElementById('videoIframe').src = '';
            document.getElementById('playerModal').style.display = 'none';
        }
        function showAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
</body>
</html>
