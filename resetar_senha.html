<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Nova Credencial // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .reset-card { width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="card-shell reset-card reveal">
        <div class="card-core" style="text-align: center;">
            <div class="nav-logo" style="margin-bottom: 24px; font-size: 1.5rem; justify-content: center;">SHAPE<span>TRACK</span></div>
            <h1>DEFINIR NOVA SENHA</h1>
            <p style="color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6; margin-bottom: 32px;">Estabeleça sua nova chave de segurança para retomar o acesso ao ecossistema.</p>

            <div class="form-group">
                <label>NOVA SENHA</label>
                <input type="password" id="new_password" placeholder="MÍNIMO 6 CARACTERES">
            </div>

            <button class="btn btn-primary" id="resetBtn" style="width: 100%; margin-top: 12px;">
                ATUALIZAR CREDENCIAIS
                <div class="btn-icon"><i class="ph-light ph-lock-key-open"></i></div>
            </button>

            <div id="message" style="margin-top: 24px; font-size: 0.8rem; font-weight: 700;"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');

        document.getElementById('resetBtn').onclick = async () => {
            const password = document.getElementById('new_password').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('resetBtn');

            if(password.length < 6) {
                msg.style.color = '#ef4444';
                msg.textContent = 'MÍNIMO DE 6 CARACTERES NECESSÁRIO.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'ATUALIZANDO... <div class="btn-icon"><i class="ph-light ph-spinner ph-spin"></i></div>';

            const { error } = await _supabase.auth.updateUser({ password: password });

            if (error) {
                msg.style.color = '#ef4444';
                msg.textContent = 'ERRO: ' + error.message.toUpperCase();
                btn.disabled = false;
                btn.innerHTML = 'ATUALIZAR CREDENCIAIS <div class="btn-icon"><i class="ph-light ph-lock-key-open"></i></div>';
            } else {
                msg.style.color = '#2ecc71';
                msg.textContent = 'SENHA ATUALIZADA! REDIRECIONANDO...';
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            }
        };
    </script>
</body>
</html>
