<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <main style="display: flex; align-items: center; justify-content: center; padding: var(--space-xl) var(--space-md);">
        <div class="card-shell reveal" style="width: 100%; max-width: 450px;">
            <div class="card-core">
                <div class="nav-logo" style="font-size: 1.5rem; text-align: center; margin-bottom: var(--space-xl);">SHAPE<span>TRACK</span></div>
                
                <h2 style="text-align: center; margin-bottom: var(--space-md);">NOVA SENHA</h2>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--space-xl); font-size: var(--font-size-sm);">ESCOLHA UMA NOVA CREDENCIAL DE ACESSO SEGURA PARA SUA CONTA.</p>

                <form id="reset-form">
                    <div class="form-group">
                        <label>NOVA SENHA</label>
                        <input type="password" id="new-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>CONFIRMAR NOVA SENHA</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-md);">
                        ATUALIZAR CREDENCIAIS
                        <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-key"></i></div>
                    </button>
                </form>

                <div style="margin-top: var(--space-xl); text-align: center;">
                    <a href="index.html" style="font-size: var(--font-size-sm); color: var(--text-secondary);">Cancelar redefinição</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js?v=3.5"></script>
    <script>
        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) return showToast('As senhas não coincidem', 'error');

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'ATUALIZANDO...';

            const { error } = await sb.auth.updateUser({ password });

            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerText = 'ATUALIZAR CREDENCIAIS';
            } else {
                showToast('Senha atualizada com sucesso!');
                setTimeout(() => window.location.href = 'dashboard.html', 2000);
            }
        };
    </script>
</body>
</html>
