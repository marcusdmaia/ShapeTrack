<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <main style="display: flex; align-items: center; justify-content: center; padding: var(--space-xl) var(--space-md);">
        <div class="card-shell reveal" style="width: 100%; max-width: 450px;">
            <div class="card-core">
                <div class="nav-logo" style="font-size: 1.5rem; text-align: center; margin-bottom: var(--space-xl);">SHAPE<span>TRACK</span></div>
                
                <h2 style="text-align: center; margin-bottom: var(--space-md);">RECUPERAR ACESSO</h2>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--space-xl); font-size: var(--font-size-sm);">ENVIAREMOS UM LINK DE REDEFINIÇÃO PARA O SEU E-MAIL CADASTRADO.</p>

                <form id="recover-form">
                    <div class="form-group">
                        <label>E-MAIL CADASTRADO</label>
                        <input type="email" id="email" placeholder="nome@exemplo.com" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-md);">
                        ENVIAR LINK DE ACESSO
                        <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-paper-plane"></i></div>
                    </button>
                </form>

                <div style="margin-top: var(--space-xl); text-align: center;">
                    <a href="index.html" style="font-size: var(--font-size-sm); color: var(--text-secondary);"><i class="ph ph-arrow-left"></i> Voltar para o login</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js?v=3.5"></script>
    <script>
        document.getElementById('recover-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerText = 'ENVIANDO...';

            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/resetar_senha.html',
            });

            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerText = 'ENVIAR LINK DE ACESSO';
            } else {
                showToast('Link de recuperação enviado! Verifique sua caixa de entrada.');
                setTimeout(() => window.location.href = 'index.html', 3000);
            }
        };
    </script>
</body>
</html>
