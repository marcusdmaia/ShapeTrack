<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Acesso // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .recovery-card { width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="card-shell recovery-card reveal">
        <div class="card-core" style="text-align: center;">
            <div class="nav-logo" style="margin-bottom: 24px; font-size: 1.5rem; justify-content: center;">SHAPE<span>TRACK</span></div>
            <h1>RECUPERAR SENHA</h1>
            <p style="color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6; margin-bottom: 32px;">Digite seu e-mail institucional para receber o link de redefinição de segurança.</p>

            <div class="form-group">
                <label>E-MAIL DE ACESSO</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <button class="btn btn-primary" id="sendBtn" style="width: 100%; margin-top: 12px;">
                ENVIAR LINK DE ACESSO
                <div class="btn-icon"><i class="ph-light ph-paper-plane-tilt"></i></div>
            </button>

            <div id="message" style="margin-top: 24px; font-size: 0.8rem; font-weight: 700;"></div>

            <a href="index.html" style="display: block; margin-top: 32px; color: var(--text-secondary); text-decoration: none; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;">
                <i class="ph-light ph-arrow-left"></i> VOLTAR AO LOGIN
            </a>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');

        document.getElementById('sendBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('sendBtn');

            if(!email) {
                msg.style.color = '#ef4444';
                msg.textContent = 'DIGITE SEU E-MAIL.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'ENVIANDO... <div class="btn-icon"><i class="ph-light ph-spinner ph-spin"></i></div>';

            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/resetar_senha.html',
            });

            if (error) {
                msg.style.color = '#ef4444';
                msg.textContent = 'ERRO: ' + error.message.toUpperCase();
                btn.disabled = false;
                btn.innerHTML = 'ENVIAR LINK DE ACESSO <div class="btn-icon"><i class="ph-light ph-paper-plane-tilt"></i></div>';
            } else {
                msg.style.color = '#2ecc71';
                msg.textContent = 'LINK ENVIADO! VERIFIQUE SEU E-MAIL.';
                btn.innerHTML = 'LINK ENVIADO <div class="btn-icon"><i class="ph-fill ph-check-circle"></i></div>';
            }
        };
    </script>
</body>
</html>
