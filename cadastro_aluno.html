<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <main style="display: flex; align-items: center; justify-content: center; padding: var(--space-xl) var(--space-md);">
        <div class="card-shell reveal" style="width: 100%; max-width: 550px;">
            <div class="card-core">
                <div class="nav-logo" style="font-size: 1.5rem; text-align: center; margin-bottom: var(--space-xl);">SHAPE<span>TRACK</span></div>
                
                <h2 style="text-align: center; margin-bottom: var(--space-md);">NOVO REGISTRO</h2>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--space-xl); font-size: var(--font-size-sm);">CRIE SUA CONTA PARA INICIAR O PROTOCOLO DE ALTA PERFORMANCE.</p>

                <form id="register-form">
                    <div class="form-group">
                        <label>NOME COMPLETO</label>
                        <input type="text" id="full_name" placeholder="DIGITE SEU NOME..." required>
                    </div>
                    <div class="form-group">
                        <label>E-MAIL CORPORATIVO</label>
                        <input type="email" id="email" placeholder="nome@exemplo.com" required>
                    </div>
                    <div class="grid-stack" style="grid-template-columns: 1fr 1fr; gap: var(--space-md);">
                        <div class="form-group">
                            <label>SENHA</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label>CONFIRMAR SENHA</label>
                            <input type="password" id="confirm-password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-md);">
                        FINALIZAR CADASTRO
                        <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-user-plus"></i></div>
                    </button>
                </form>

                <div style="margin-top: var(--space-xl); text-align: center;">
                    <a href="index.html" style="font-size: var(--font-size-sm); color: var(--text-secondary);">Já possui conta? <span style="color: var(--accent); font-weight: 700;">Fazer login</span></a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js?v=3.5"></script>
    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const fullName = document.getElementById('full_name').value;

            if (password !== confirmPassword) return showToast('As senhas não coincidem', 'error');

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'PROCESSANDO...';

            const { data, error } = await sb.auth.signUp({ email, password });

            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerText = 'FINALIZAR CADASTRO';
            } else {
                // Create profile
                const { error: profileError } = await sb.from('profiles').insert([{
                    id: data.user.id,
                    full_name: fullName,
                    email: email,
                    role: 'client'
                }]);

                if (profileError) {
                    showToast('Conta criada, mas erro no perfil. Contate o suporte.', 'warning');
                } else {
                    showToast('Conta criada com sucesso! Verifique seu e-mail.');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                }
            }
        };
    </script>
</body>
</html>
