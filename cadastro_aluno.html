<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciação de Protocolo // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .onboarding-card { width: 100%; max-width: 440px; }
    </style>
</head>
<body>

    <div class="card-shell onboarding-card reveal">
        <div class="card-core" style="text-align: center;">
            <div class="nav-logo" style="margin-bottom: 24px; font-size: 2rem;">SHAPE<span>TRACK</span></div>
            
            <div id="mentor-info" style="display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.02); padding: 8px 16px; border-radius: 50px; font-size: 0.75rem; border: 1px solid var(--glass-border); margin-bottom: 32px; color: var(--text-secondary); font-weight: 700;">
                <i class="ph-light ph-spinner ph-spin"></i> VALIDANDO ACESSO...
            </div>

            <p style="color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6; margin-bottom: 32px;">Seja bem-vindo ao ecossistema ShapeTrack. Complete sua identificação para iniciar o protocolo.</p>

            <div class="form-group">
                <label>NOME COMPLETO</label>
                <input type="text" id="name" placeholder="EX: JOÃO SILVA" required>
            </div>

            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left;">
                <div class="form-group">
                    <label>E-MAIL</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>WHATSAPP</label>
                    <input type="text" id="whatsapp" placeholder="11999999999" required>
                </div>
                <div class="form-group">
                    <label>NASCIMENTO</label>
                    <input type="date" id="birthday" required>
                </div>
                <div class="form-group">
                    <label>ALTURA (CM)</label>
                    <input type="number" id="height" placeholder="175" required>
                </div>
                <div class="form-group">
                    <label>GÊNERO</label>
                    <select id="gender">
                        <option value="masculino">MASCULINO</option>
                        <option value="feminino">FEMININO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>OBJETIVO</label>
                    <select id="goal">
                        <option value="perda">PERDA DE PESO</option>
                        <option value="ganho">GANHO DE MASSA</option>
                        <option value="manutencao">MANUTENÇÃO</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-top: 12px;">
                <label>CHAVE DE ACESSO (SENHA)</label>
                <input type="password" id="password" placeholder="MÍNIMO 6 CARACTERES" required>
            </div>

            <button class="btn btn-primary" id="signupBtn" style="width: 100%; margin-top: 24px;">
                INICIAR MEU PROTOCOLO
                <div class="btn-icon"><i class="ph-light ph-user-plus"></i></div>
            </button>

            <div id="message" style="margin-top: 24px; font-size: 0.8rem; font-weight: 700;"></div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');
        const urlParams = new URLSearchParams(window.location.search);
        const mentorId = urlParams.get('mentor'); // Updated to match alunos.html link generation

        async function checkMentor() {
            if (!mentorId) {
                document.body.innerHTML = '<div class="card-shell reveal" style="max-width: 400px;"><div class="card-core" style="text-align:center;"><h1>CONVITE INVÁLIDO</h1><p style="color:var(--text-secondary); margin-top:16px;">SOLICITE UM NOVO LINK AO SEU MENTOR.</p></div></div>';
                return;
            }
            const { data: mentor } = await sb.from('profiles').select('full_name').eq('id', mentorId).single();
            if (mentor) {
                document.getElementById('mentor-info').innerHTML = `<i class="ph-fill ph-user-check" style="color: var(--accent);"></i> MENTOR: ${mentor.full_name.toUpperCase()}`;
            }
        }

        document.getElementById('signupBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('signupBtn');

            if (!name || !email || !password) {
                msg.style.color = '#ef4444';
                msg.textContent = 'PREENCHA TODOS OS CAMPOS.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'PROCESSANDO... <div class="btn-icon"><i class="ph-light ph-spinner ph-spin"></i></div>';

            const { data, error } = await sb.auth.signUp({ 
                email, 
                password,
                options: { data: { full_name: name } }
            });

            if (error) {
                if (error.message.includes('already registered')) {
                    msg.style.color = 'var(--accent)';
                    msg.innerHTML = `VOCÊ JÁ POSSUI UMA CONTA.<br><a href="index.html" class="btn btn-secondary" style="margin-top:16px; width:100%; display:block; text-decoration:none; padding:12px;">IR PARA LOGIN</a>`;
                } else {
                    msg.style.color = '#ef4444';
                    msg.textContent = `ERRO: ${error.message.toUpperCase()}`;
                }
                btn.disabled = false;
                btn.innerHTML = 'INICIAR MEU PROTOCOLO <div class="btn-icon"><i class="ph-light ph-user-plus"></i></div>';
                return;
            }

            if (data.user) {
                // Perfil será criado via Trigger no Supabase ou via fallback no config.js.
                // Mas garantimos aqui os campos extras do cadastro.
                const profileData = { 
                    full_name: name,
                    email: email,
                    whatsapp: document.getElementById('whatsapp').value,
                    birthday: document.getElementById('birthday').value,
                    height: parseFloat(document.getElementById('height').value),
                    gender: document.getElementById('gender').value,
                    goal: document.getElementById('goal').value,
                    role: 'client', 
                    mentor_id: mentorId,
                    is_active: true
                };

                const { error: profileError } = await sb.from('profiles').upsert({ id: data.user.id, ...profileData });

                if (profileError) {
                    console.error('Profile link error:', profileError);
                }
                
                msg.style.color = '#2ecc71';
                msg.textContent = 'CONTA CRIADA! REDIRECIONANDO...';
                setTimeout(() => { window.location.href = 'relatorio.html'; }, 1500);
            }
        });

        checkMentor();
    </script>
</body>
</html>
