<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Prospecção // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <div class="bento-grid">
        <!-- Header -->
        <div class="card-shell reveal span-12">
            <div class="card-core">
                <div class="header-content">
                    <span class="eyebrow">Inteligência de Captura</span>
                    <h1>LEAD RADAR</h1>
                    <p class="text-secondary">Monitoramento de prospecção e conversão em tempo real.</p>
                </div>
                <div class="header-actions">
                    <button class="btn" style="background: rgba(255,255,255,0.05); color: #FFF;" onclick="window.open('calculadora.html', '_blank')">
                        ABRIR CALCULADORA
                        <div class="btn-icon"><i class="ph-light ph-calculator"></i></div>
                    </button>
                    <button class="btn btn-primary" onclick="copyFunnelLink()">
                        LINK DO FUNIL
                        <div class="btn-icon"><i class="ph-light ph-link"></i></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="card-shell reveal span-12" style="animation-delay: 0.1s;">
            <div class="card-core">
                <div class="search-bar">
                    <i class="ph-light ph-magnifying-glass"></i>
                    <input type="text" id="search-leads" placeholder="FILTRAR POR NOME OU WHATSAPP..." oninput="filterLeads()">
                </div>
            </div>
        </div>

        <!-- Leads Grid -->
        <div id="leads-list" class="leads-grid span-12">
            <!-- Leads -->
        </div>
    </div>

    <script src="js/config.js?v=3.9"></script>
    <script>
        let allLeads = [];

        async function init() {
            const context = await App.init('leads_admin.html');
            if (!context) return;
            loadLeads(context.session.user.id);
        }

        async function loadLeads(mentorId) {
            const { data: leads } = await sb.from('leads').select('*').eq('mentor_id', mentorId).order('created_at', { ascending: false });
            allLeads = leads || [];
            renderLeads(allLeads);
        }

        function renderLeads(list) {
            const container = document.getElementById('leads-list');
            container.innerHTML = list.length ? '' : '<div class="card-shell" style="grid-column: 1/-1;"><div class="card-core" style="text-align: center; padding: 64px; color: var(--text-secondary);">NENHUM LEAD IDENTIFICADO NO RADAR.</div></div>';
            
            list.forEach(lead => {
                const date = new Date(lead.created_at).toLocaleDateString('pt-BR');
                const macros = lead.calculated_data;
                const goalText = lead.goal === 'loss' ? 'EMAGRECER' : (lead.goal === 'gain' ? 'GANHAR PESO' : 'MANTER');
                
                const card = document.createElement('div');
                card.className = 'card-shell reveal';
                card.innerHTML = `
                    <div class="card-core">
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 16px;">
                            <span><i class="ph-light ph-calendar"></i> ${date}</span>
                            <span style="background: var(--accent); color: #FFF; padding: 4px 8px; border-radius: 6px;">${goalText}</span>
                        </div>
                        <h3 style="font-size: 1.1rem; font-weight: 800; color: #FFF; margin-bottom: 20px;">${lead.full_name.toUpperCase()}</h3>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 24px;">
                            <div style="display: flex; flex-direction: column;"><span style="font-size: 0.6rem; color: var(--text-secondary); font-weight: 700;">CALORIAS</span><span style="font-size: 1rem; font-weight: 800; color: #FFF;">${macros.calories}</span></div>
                            <div style="display: flex; flex-direction: column;"><span style="font-size: 0.6rem; color: var(--text-secondary); font-weight: 700;">PROTEÍNA</span><span style="font-size: 1rem; font-weight: 800; color: #FFF;">${macros.protein}g</span></div>
                            <div style="display: flex; flex-direction: column;"><span style="font-size: 0.6rem; color: var(--text-secondary); font-weight: 700;">CARBOS</span><span style="font-size: 1rem; font-weight: 800; color: #FFF;">${macros.carbs}g</span></div>
                            <div style="display: flex; flex-direction: column;"><span style="font-size: 0.6rem; color: var(--text-secondary); font-weight: 700;">ÁGUA</span><span style="font-size: 1rem; font-weight: 800; color: #FFF;">${macros.water}L</span></div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <button class="btn btn-primary" onclick="convertLead('${lead.id}')" style="font-size: 0.7rem; padding: 10px;">CONVERTER</button>
                            <a href="https://wa.me/55${lead.whatsapp?.replace(/\D/g,'')}" target="_blank" class="btn" style="background: #25D366; color: #000; font-size: 0.7rem; padding: 10px;"><i class="ph-fill ph-whatsapp-logo"></i> WHATSAPP</a>
                        </div>
                        <button class="btn" onclick="deleteLead('${lead.id}')" style="width: 100%; margin-top: 10px; background: rgba(239, 68, 68, 0.1); color: #ef4444; font-size: 0.7rem; padding: 8px; border: 1px solid rgba(239, 68, 68, 0.2);">
                            <i class="ph ph-trash"></i> EXCLUIR LEAD
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterLeads() {
            const query = document.getElementById('search-leads').value.toLowerCase();
            renderLeads(allLeads.filter(l => l.full_name.toLowerCase().includes(query) || l.whatsapp.includes(query)));
        }

        async function deleteLead(leadId) {
            if (!confirm('DESEJA REALMENTE EXCLUIR ESTE LEAD DO RADAR?')) return;
            const { error } = await sb.from('leads').delete().eq('id', leadId);
            if (error) return showToast(error.message, 'error');
            showToast('Lead removido!');
            loadLeads(App.profile.id);
        }

        async function convertLead(leadId) {
            if (!confirm('TRANSFORMAR ESTE LEAD EM UM ALUNO OFICIAL?')) return;
            const lead = allLeads.find(l => l.id === leadId);
            const { error: pError } = await sb.from('profiles').insert([{
                id: lead.id, full_name: lead.full_name, role: 'client', mentor_id: App.profile.id, whatsapp: lead.whatsapp
            }]);
            if (pError) return showToast(pError.message, 'error');
            await sb.from('leads').delete().eq('id', leadId);
            showToast('Lead convertido com sucesso!');
            loadLeads(App.profile.id);
        }

        async function copyFunnelLink() {
            const link = window.location.origin + window.location.pathname.replace('leads_admin.html', 'calculadora.html') + `?mentor=${App.profile.id}`;
            navigator.clipboard.writeText(link);
            showToast('Link do Funil copiado!');
        }

        init();
    </script>
</body>
</html>
