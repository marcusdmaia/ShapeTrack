<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <main class="container">
        <div class="bento-grid">
            <!-- Header -->
            <div class="card-shell reveal" style="grid-column: span 12;">
                <div class="card-core">
                    <span class="eyebrow">Pipeline de Aquisição</span>
                    <h1 style="margin: 4px 0;">CENTRAL DE LEADS</h1>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Gestão de potenciais alunos e solicitações de ingresso.</p>
                </div>
            </div>

            <!-- List -->
            <div class="card-shell reveal" style="grid-column: span 12; animation-delay: 0.1s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg);">SOLICITAÇÕES PENDENTES</h3>
                    <div id="leads-list" style="display: flex; flex-direction: column; gap: var(--space-md);">
                        <div style="text-align: center; padding: 48px; color: var(--text-secondary);">CARREGANDO LEADS...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container" style="padding: var(--space-xl) var(--space-md); text-align: center; color: var(--text-secondary); font-size: 0.7rem; letter-spacing: 0.1em;">
        &copy; 2026 SHAPETRACK // HIGH-END PERFORMANCE ECOSYSTEM
    </footer>

    <script src="js/config.js?v=3.5"></script>
    <script>
        async function init() {
            const context = await App.init('leads_admin.html');
            if (!context) return;
            loadLeads(context.session.user.id);
        }

        async function loadLeads(userId) {
            const { data } = await sb.from('leads').select('*').eq('mentor_id', userId).order('created_at', { ascending: false });
            const container = document.getElementById('leads-list');
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(lead => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-md); background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px; flex-wrap: wrap; gap: var(--space-md);">
                        <div>
                            <div style="font-weight: 700; font-size: 0.9rem; color: #FFF;">${lead.name.toUpperCase()}</div>
                            <div style="font-size: 0.7rem; color: var(--text-secondary);">${lead.email} | ${lead.phone || 'SEM TELEFONE'}</div>
                        </div>
                        <div style="display: flex; gap: var(--space-sm);">
                            <a href="https://wa.me/${lead.phone}" target="_blank" class="btn" style="padding: 8px 16px; font-size: 0.7rem; background: #25D366; color: #FFF;">WHATSAPP</a>
                            <button onclick="deleteLead('${lead.id}')" class="btn" style="padding: 8px 16px; font-size: 0.7rem; background: rgba(239, 68, 68, 0.1); color: #ef4444;">EXCLUIR</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div style="text-align: center; padding: 48px; color: var(--text-secondary);">NENHUM LEAD PENDENTE NO MOMENTO.</div>`;
            }
        }

        async function deleteLead(id) {
            if (confirm('Deseja excluir este lead?')) {
                await sb.from('leads').delete().eq('id', id);
                showToast('Lead removido');
                init();
            }
        }

        init();
    </script>
</body>
</html>
