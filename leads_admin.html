<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Leads | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
            <div>
                <h1 class="page-title">Gestão de Leads</h1>
                <p style="color: var(--text-dim);">Pessoas que calcularam macros através do seu link.</p>
            </div>
            <button class="btn btn-primary" onclick="copyFunnelLink()">
                <i class="fas fa-link"></i> Link do Funil
            </button>
        </header>

        <div class="search-container" style="position: relative; margin-bottom: 32px;">
            <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim);"></i>
            <input type="text" id="search-leads" placeholder="Buscar por nome ou WhatsApp..." oninput="filterLeads()" style="width: 100%; padding: 14px 14px 14px 48px; border: 2px solid #f1f5f9; border-radius: 16px; outline: none;">
        </div>

        <div id="leads-list" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;">
            <!-- Leads -->
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        let allLeads = [];

        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'leads_admin.html');

            loadLeads(session.user.id);
        }

        async function loadLeads(mentorId) {
            const { data: leads } = await sb.from('leads').select('*').eq('mentor_id', mentorId).order('created_at', { ascending: false });
            allLeads = leads || [];
            renderLeads(allLeads);
        }

        function renderLeads(list) {
            const container = document.getElementById('leads-list');
            container.innerHTML = list.length ? '' : '<p style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-dim);">Nenhum lead capturado ainda.</p>';
            
            list.forEach(lead => {
                const date = new Date(lead.created_at).toLocaleDateString('pt-BR');
                const macros = lead.calculated_data;
                const goalText = lead.goal === 'loss' ? 'Emagrecer' : (lead.goal === 'gain' ? 'Ganhar Peso' : 'Manter');
                
                const card = document.createElement('div');
                card.className = 'card lead-card';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.gap = '20px';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase;">
                        <span><i class="fas fa-calendar-day"></i> ${date}</span>
                        <span class="badge badge-warning">${goalText}</span>
                    </div>
                    <div style="font-size: 1.25rem; font-weight: 800; color: var(--primary); margin: 5px 0;">${lead.full_name}</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f8faf9; padding: 15px; border-radius: 16px;">
                        <div style="display: flex; flex-direction: column;"><span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;">Calorias</span><span style="font-size: 1.1rem; font-weight: 800; color: var(--primary);">${macros.calories}</span></div>
                        <div style="display: flex; flex-direction: column;"><span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;">Proteína</span><span style="font-size: 1.1rem; font-weight: 800; color: var(--primary);">${macros.protein}g</span></div>
                        <div style="display: flex; flex-direction: column;"><span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;">Carbos</span><span style="font-size: 1.1rem; font-weight: 800; color: var(--primary);">${macros.carbs}g</span></div>
                        <div style="display: flex; flex-direction: column;"><span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;">Água</span><span style="font-size: 1.1rem; font-weight: 800; color: var(--primary);">${macros.water}L</span></div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button class="btn btn-accent" onclick="convertLead('${lead.id}')" style="font-size: 0.8rem;"><i class="fas fa-user-check"></i> Virar Aluno</button>
                        <a href="https://wa.me/55${lead.whatsapp?.replace(/\D/g,'')}" target="_blank" class="btn btn-outline" style="font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterLeads() {
            const query = document.getElementById('search-leads').value.toLowerCase();
            renderLeads(allLeads.filter(l => l.full_name.toLowerCase().includes(query) || l.whatsapp.includes(query)));
        }

        async function convertLead(leadId) {
            if (!confirm('Deseja transformar este lead em um Aluno oficial?')) return;
            const lead = allLeads.find(l => l.id === leadId);
            const { data: { session } } = await sb.auth.getSession();
            
            const { error: pError } = await sb.from('profiles').insert([{
                id: lead.id, full_name: lead.full_name, role: 'client', mentor_id: session.user.id, whatsapp: lead.whatsapp
            }]);

            if (pError) { alert(pError.message); return; }

            await sb.from('leads').delete().eq('id', leadId);
            alert('Lead convertido com sucesso!');
            loadLeads(session.user.id);
        }

        async function copyFunnelLink() {
            const { data: { session } } = await sb.auth.getSession();
            const link = window.location.origin + window.location.pathname.replace('leads_admin.html', 'calculadora.html') + `?mentor=${session.user.id}`;
            navigator.clipboard.writeText(link);
            alert('Link do Funil copiado!');
        }

        init();
    </script>
</body>
</html>
</body>
</html>
