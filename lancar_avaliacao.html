<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura Biométrica // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.1">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <div class="bento-grid">
        <!-- Header -->
        <div class="card-shell reveal" style="grid-column: span 12;">
            <div class="card-core">
                <span class="eyebrow">Input de Performance</span>
                <h1>LANÇAR AVALIAÇÃO</h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">Registro preciso de dados antropométricos e bioimpedância.</p>
            </div>
        </div>

        <!-- Student Selection -->
        <div class="card-shell reveal" style="grid-column: span 12; animation-delay: 0.1s;">
            <div class="card-core">
                <div class="form-group">
                    <label>IDENTIFICAÇÃO DO ALUNO</label>
                    <select id="select-aluno" style="background: rgba(255,255,255,0.02);">
                        <option value="">SELECIONE UM ATIVO NA REDE...</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Bioimpedance Data -->
        <div class="card-shell reveal" style="grid-column: span 8; animation-delay: 0.2s;">
            <div class="card-core">
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-activity" style="color: var(--accent);"></i> BIOIMPEDÂNCIA</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                    <div class="form-group">
                        <label>PESO (KG)</label>
                        <input type="number" id="weight" step="0.1" placeholder="00.0">
                    </div>
                    <div class="form-group">
                        <label>% GORDURA</label>
                        <input type="number" id="body_fat" step="0.1" placeholder="00.0">
                    </div>
                    <div class="form-group">
                        <label>% MUSCULAR</label>
                        <input type="number" id="muscle_mass" step="0.1" placeholder="00.0">
                    </div>
                    <div class="form-group">
                        <label>GORD. VISCERAL</label>
                        <input type="number" id="visceral_fat" step="1" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>IDADE METAB.</label>
                        <input type="number" id="metabolic_age" step="1" placeholder="00">
                    </div>
                    <div class="form-group">
                        <label>% ÁGUA</label>
                        <input type="number" id="body_water" step="0.1" placeholder="00.0">
                    </div>
                </div>
                <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--glass-border);">
                    <h3 style="margin-bottom: 24px;"><i class="ph-light ph-target" style="color: var(--accent);"></i> CONFIGURAÇÃO DE META</h3>
                    <div class="form-group" style="max-width: 250px;">
                        <label>PESO META DO PROTOCOLO (KG)</label>
                        <input type="number" id="target_weight" step="0.1" placeholder="Ex: 85.0">
                        <p style="font-size: 0.6rem; color: var(--text-secondary); margin-top: 8px;">Este valor define a barra de progresso do aluno.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Measurements & Next Date -->
        <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.3s;">
            <div class="card-core">
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-ruler" style="color: var(--accent);"></i> MEDIDAS (CM)</h3>
                <div class="form-group">
                    <label>CINTURA</label>
                    <input type="number" id="waist" step="0.1" placeholder="00.0">
                </div>
                <div class="form-group">
                    <label>ABDOMEN</label>
                    <input type="number" id="abdomen" step="0.1" placeholder="00.0">
                </div>
                <div class="form-group" style="margin-bottom: 32px;">
                    <label>QUADRIL</label>
                    <input type="number" id="hip" step="0.1" placeholder="00.0">
                </div>
                
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-calendar-plus" style="color: var(--accent);"></i> AGENDA</h3>
                <div class="form-group">
                    <label>PRÓXIMO RETORNO</label>
                    <input type="date" id="next_assessment_date">
                </div>

                <button class="btn btn-primary" id="btn-save" style="width: 100%; margin-top: 24px;">
                    SALVAR DADOS
                    <div class="btn-icon"><i class="ph-light ph-check"></i></div>
                </button>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3.1"></script>
    <script>
        async function init() {
            const context = await App.init('lancar_avaliacao.html');
            if (!context) return;
            loadAlunos(context.session.user.id);
        }

        async function loadAlunos(mentorId) {
            const { data: alunos } = await sb.from('profiles').select('id, full_name').eq('mentor_id', mentorId).eq('role', 'client');
            const select = document.getElementById('select-aluno');
            alunos?.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.id;
                opt.textContent = a.full_name.toUpperCase();
                select.appendChild(opt);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const alunoId = urlParams.get('aluno');
            if (alunoId) {
                select.value = alunoId;
                const { data: prof } = await sb.from('profiles').select('target_weight').eq('id', alunoId).single();
                if (prof?.target_weight) document.getElementById('target_weight').value = prof.target_weight;
            }
        }

        document.getElementById('btn-save').onclick = async () => {
            const btn = document.getElementById('btn-save');
            const alunoId = document.getElementById('select-aluno').value;
            if (!alunoId) return showToast('Selecione um aluno', 'error');

            btn.disabled = true;
            const weight = parseFloat(document.getElementById('weight').value || 0);
            const height = App.profile.height || 170; // Fallback or get from profile
            const imc = weight / ((height/100) ** 2);

            const assessment = {
                client_id: alunoId, 
                mentor_id: App.profile.id,
                weight: weight,
                body_fat: parseFloat(document.getElementById('body_fat').value || 0),
                muscle_percentage: parseFloat(document.getElementById('muscle_mass').value || 0),
                visceral_fat: parseFloat(document.getElementById('visceral_fat').value || 0),
                body_age: parseFloat(document.getElementById('metabolic_age').value || 0),
                imc: parseFloat(imc.toFixed(2)),
                measurements: JSON.stringify({
                    waist: document.getElementById('waist').value,
                    abdomen: document.getElementById('abdomen').value,
                    hip: document.getElementById('hip').value
                }),
                notes: `Água: ${document.getElementById('body_water').value}%`
            };

            const nextDate = document.getElementById('next_assessment_date').value;

            try {
                const { error } = await sb.from('assessments').insert([assessment]);
                if (error) throw error;
                
                // Update profile with target weight and next date
                const targetWeight = parseFloat(document.getElementById('target_weight').value);
                const updates = {};
                if (nextDate) updates.next_assessment_date = nextDate;
                if (!isNaN(targetWeight)) updates.target_weight = targetWeight;
                
                // Set initial_weight if not already set
                const { data: prof } = await sb.from('profiles').select('initial_weight').eq('id', alunoId).single();
                if (!prof?.initial_weight) updates.initial_weight = weight;

                if (Object.keys(updates).length > 0) {
                    await sb.from('profiles').update(updates).eq('id', alunoId);
                }
                
                showToast('Avaliação processada!');
                setTimeout(() => window.location.href = 'alunos.html', 1500);
            } catch (err) { showToast(err.message, 'error'); } finally { btn.disabled = false; }
        };

        init();
    </script>
</body>
</html>
