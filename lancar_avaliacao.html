<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura Biométrica // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <div class="bento-grid">
        <div class="card-shell reveal span-12">
            <div class="card-core">
                <div class="header-content">
                    <span class="eyebrow">Input de Performance</span>
                    <h1 id="page-title">LANÇAR AVALIAÇÃO</h1>
                    <p id="page-subtitle" class="text-secondary">Registro preciso de dados antropométricos e bioimpedância.</p>
                </div>
            </div>
        </div>

        <!-- Student Selection -->
        <div id="selection-card" class="card-shell reveal span-12" style="animation-delay: 0.1s;">
            <div class="card-core">
                <div class="form-group">
                    <label>IDENTIFICAÇÃO DO ALUNO</label>
                    <select id="select-aluno" onchange="onAlunoChange()" style="background: #FFFFFF;">
                        <option value="">SELECIONE UM ATIVO NA REDE...</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-shell reveal span-8" style="animation-delay: 0.2s;">
            <div class="card-core">
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-activity" style="color: var(--accent);"></i> BIOIMPEDÂNCIA</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                    <div class="form-group"><label>PESO (KG)</label><input type="number" id="weight" step="0.1" placeholder="00.0"></div>
                    <div class="form-group"><label>% GORDURA</label><input type="number" id="body_fat" step="0.1" placeholder="00.0"></div>
                    <div class="form-group"><label>% MUSCULAR</label><input type="number" id="muscle_mass" step="0.1" placeholder="00.0"></div>
                    <div class="form-group"><label>GORD. VISCERAL</label><input type="number" id="visceral_fat" step="1" placeholder="0"></div>
                    <div class="form-group"><label>IDADE CORPORAL</label><input type="number" id="metabolic_age" step="1" placeholder="00"></div>
                    <div class="form-group"><label>TAXA METABÓLICA (KCAL)</label><input type="number" id="bmr" step="1" placeholder="0000"></div>
                </div>
                <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--glass-border);">
                    <h3 style="margin-bottom: 24px;"><i class="ph-light ph-target" style="color: var(--accent);"></i> CONFIGURAÇÃO DE META</h3>
                    <div class="form-group" style="max-width: 250px;">
                        <label>PESO META DO PROTOCOLO (KG)</label>
                        <input type="number" id="target_weight" step="0.1" placeholder="Ex: 85.0">
                    </div>
                </div>
            </div>
        </div>

        <div class="card-shell reveal span-4" style="animation-delay: 0.3s;">
            <div class="card-core">
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-ruler" style="color: var(--accent);"></i> MEDIDAS (CM)</h3>
                <div class="form-group"><label>CINTURA</label><input type="number" id="waist" step="0.1" placeholder="00.0"></div>
                <div class="form-group"><label>ABDOMEN</label><input type="number" id="abdomen" step="0.1" placeholder="00.0"></div>
                <div class="form-group"><label>QUADRIL</label><input type="number" id="hip" step="0.1" placeholder="00.0"></div>
                <h3 style="margin-bottom: 24px;"><i class="ph-light ph-calendar-plus" style="color: var(--accent);"></i> AGENDA</h3>
                <div class="form-group"><label>PRÓXIMO RETORNO</label><input type="date" id="next_assessment_date"></div>
                <button class="btn btn-primary" id="btn-save" style="width: 100%; margin-top: 24px;">SALVAR DADOS</button>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3.9"></script>
    <script>
        let editId = null;
        let activeStudentId = null;

        async function init() {
            const context = await App.init('lancar_avaliacao.html');
            if (!context) return;
            const urlParams = new URLSearchParams(window.location.search);
            editId = urlParams.get('id');
            if (editId) {
                document.getElementById('page-title').textContent = 'EDITAR AVALIAÇÃO';
                document.getElementById('page-subtitle').textContent = 'Ajuste os parâmetros da medição selecionada.';
                document.getElementById('selection-card').style.display = 'none';
                loadAssessmentForEdit();
            } else {
                loadAlunos(context.session.user.id);
            }
        }

        async function loadAssessmentForEdit() {
            try {
                const { data: ass, error } = await sb.from('assessments').select('*').eq('id', editId).single();
                if (error || !ass) {
                    showToast('Erro ao carregar avaliação', 'error');
                    return;
                }
                
                activeStudentId = ass.client_id;
                document.getElementById('weight').value = ass.weight || '';
                
                // Mapeamento flexível de gordura e músculo
                document.getElementById('body_fat').value = ass.body_fat ?? ass.fat_percentage ?? '';
                document.getElementById('muscle_mass').value = ass.muscle_percentage ?? ass.muscle_mass ?? '';
                
                document.getElementById('visceral_fat').value = ass.visceral_fat || '';
                document.getElementById('metabolic_age').value = ass.body_age || '';
                document.getElementById('bmr').value = ass.basal_metabolic_rate ?? ass.basal_metabolism ?? '';
                
                // Fetch profile separately to avoid relation/RLS errors
                if (activeStudentId) {
                    const { data: prof } = await sb.from('profiles').select('target_weight, next_assessment_date').eq('id', activeStudentId).single();
                    if (prof) {
                        document.getElementById('target_weight').value = prof.target_weight || '';
                        if (prof.next_assessment_date) document.getElementById('next_assessment_date').value = prof.next_assessment_date;
                    }
                }

                const m = ass.measurements ? (typeof ass.measurements === 'string' ? JSON.parse(ass.measurements) : ass.measurements) : {};
                document.getElementById('waist').value = m.waist || '';
                document.getElementById('abdomen').value = m.abdomen || '';
                document.getElementById('hip').value = m.hip || '';
                
                showToast('Dados carregados!');
            } catch (e) {
                console.error(e);
                showToast('Erro ao processar dados', 'error');
            }
        }

        async function loadAlunos(mentorId) {
            const { data: alunos } = await sb.from('profiles').select('id, full_name').eq('mentor_id', mentorId).eq('role', 'aluno');
            const select = document.getElementById('select-aluno');
            alunos?.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.id; opt.textContent = a.full_name.toUpperCase();
                select.appendChild(opt);
            });
            const urlParams = new URLSearchParams(window.location.search);
            const alunoId = urlParams.get('aluno');
            if (alunoId) { select.value = alunoId; onAlunoChange(); }
        }

        async function onAlunoChange() {
            activeStudentId = document.getElementById('select-aluno').value;
            if (!activeStudentId) return;
            const { data: prof } = await sb.from('profiles').select('*').eq('id', activeStudentId).single();
            if (prof) {
                if (prof.target_weight) document.getElementById('target_weight').value = prof.target_weight;
                if (prof.next_assessment_date) document.getElementById('next_assessment_date').value = prof.next_assessment_date;
            }
        }

        document.getElementById('btn-save').onclick = async () => {
            const btn = document.getElementById('btn-save');
            if (!editId && !activeStudentId) return showToast('Selecione um aluno', 'error');

            btn.disabled = true;
            btn.textContent = 'SALVANDO...';

            const weight = parseFloat(document.getElementById('weight').value || 0);
            
            // Buscar altura para calcular IMC preciso
            let height = 175;
            if (activeStudentId) {
                const { data: p } = await sb.from('profiles').select('height').eq('id', activeStudentId).single();
                if (p?.height) height = p.height;
            }
            const imc = weight / (Math.pow(height/100, 2));

            const assessment = {
                weight: weight,
                body_fat: parseFloat(document.getElementById('body_fat').value || 0),
                fat_percentage: parseFloat(document.getElementById('body_fat').value || 0),
                muscle_percentage: parseFloat(document.getElementById('muscle_mass').value || 0),
                visceral_fat: parseFloat(document.getElementById('visceral_fat').value || 0),
                body_age: parseFloat(document.getElementById('metabolic_age').value || 0),
                basal_metabolic_rate: parseFloat(document.getElementById('bmr').value || 0),
                imc: parseFloat(imc.toFixed(2)),
                measurements: JSON.stringify({
                    waist: document.getElementById('waist').value,
                    abdomen: document.getElementById('abdomen').value,
                    hip: document.getElementById('hip').value
                })
            };

            try {
                if (editId) {
                    await sb.from('assessments').update(assessment).eq('id', editId);
                } else {
                    assessment.client_id = activeStudentId;
                    assessment.mentor_id = App.profile.id;
                    await sb.from('assessments').insert([assessment]);
                }
                
                // Atualizar perfil do aluno com meta e data
                const targetWeight = parseFloat(document.getElementById('target_weight').value);
                const nextDate = document.getElementById('next_assessment_date').value;
                const profileUpdates = {};
                if (!isNaN(targetWeight)) profileUpdates.target_weight = targetWeight;
                if (nextDate) profileUpdates.next_assessment_date = nextDate;
                
                if (Object.keys(profileUpdates).length > 0) {
                    await sb.from('profiles').update(profileUpdates).eq('id', activeStudentId);
                }

                showToast('Dados sincronizados com sucesso!');
                setTimeout(() => window.location.href = 'relatorio.html?aluno=' + activeStudentId, 1500);
            } catch (err) { 
                showToast(err.message, 'error'); 
            } finally { 
                btn.disabled = false; 
                btn.textContent = 'SALVAR DADOS';
            }
        };
        init();
    </script>
</body>
</html>
