<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançar Avaliação | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8faf9;
            --primary: #2F5948;
            --primary-light: #3d755e;
            --accent: #D96C2B;
            --text-main: #1a1c1b;
            --text-dim: #64748b;
            --white: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Desktop */
        .sidebar {
            width: 280px;
            background: var(--primary);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            color: white;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 48px;
            cursor: pointer;
        }

        .logo span { color: var(--accent); }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-item i { width: 24px; text-align: center; }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 48px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .card-form {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .btn-save {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(47, 89, 72, 0.2);
            margin-top: 20px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(47, 89, 72, 0.3);
        }

        @media (max-width: 768px) {
            .grid-inputs { grid-template-columns: 1fr; }
            .main-content { padding: 24px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links">
            <!-- Nav Dinâmico -->
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title" id="client-name">Lançar Avaliação</h1>
            <p style="color: var(--text-dim);">Preencha os dados da bioimpedância para gerar o relatório.</p>
        </header>

        <div class="card-form">
            <div class="grid-inputs">
                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>IMC</label>
                    <input type="number" id="imc" step="0.1" placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>% Gordura Corporal</label>
                    <input type="number" id="fat" step="0.1" placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>Gordura Visceral</label>
                    <input type="number" id="visc" step="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>% Massa Muscular</label>
                    <input type="number" id="musc" step="0.1" placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>Idade Corporal</label>
                    <input type="number" id="age" step="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Metabolismo Basal (kcal)</label>
                    <input type="number" id="met" step="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Data p/ Próxima Avaliação</label>
                    <input type="date" id="next-date">
                </div>
            </div>

            <button class="btn-save" id="btn-save">Salvar e Gerar Evolução</button>
        </div>
    </main>

    <script>
        const sb = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');
        const alunoId = new URLSearchParams(location.search).get('alunoId');

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile);

            if (alunoId) {
                const { data: aluno } = await sb.from('profiles').select('full_name').eq('id', alunoId).single();
                if (aluno) document.getElementById('client-name').textContent = 'Avaliação: ' + aluno.full_name;
            } else {
                window.location.href = 'alunos.html';
            }
        }

        function setupNav(profile) {
            const nav = document.getElementById('nav-links');
            let navHtml = `
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
                <a href="crm_dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Gestão 360</span></a>
                <a href="vendas.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Vendas</span></a>
            `;

            if (profile.role === 'admin' || profile.role === 'superadmin') {
                navHtml += `
                    <a href="videos.html" class="nav-item"><i class="fas fa-play-circle"></i><span>Vídeos</span></a>
                    <a href="parcerias.html" class="nav-item"><i class="fas fa-handshake"></i><span>Parcerias</span></a>
                    <a href="alunos.html" class="nav-item active"><i class="fas fa-users"></i><span>Alunos</span></a>
                    <a href="leads_admin.html" class="nav-item"><i class="fas fa-filter"></i><span>Leads</span></a>
                    <a href="configuracoes.html" class="nav-item"><i class="fas fa-cog"></i><span>Ajustes</span></a>
                `;
            }
            nav.innerHTML = navHtml;
        }

        document.getElementById('btn-save').onclick = async () => {
            const btn = document.getElementById('btn-save');
            const nextDate = document.getElementById('next-date').value;
            btn.disabled = true;
            btn.textContent = 'Salvando Dados...';

            const d = {
                client_id: alunoId, 
                weight: parseFloat(document.getElementById('weight').value || 0),
                imc: parseFloat(document.getElementById('imc').value || 0),
                fat_percentage: parseFloat(document.getElementById('fat').value || 0),
                visceral_fat: parseFloat(document.getElementById('visc').value || 0),
                muscle_percentage: parseFloat(document.getElementById('musc').value || 0),
                body_age: parseInt(document.getElementById('age').value || 0),
                basal_metabolism: parseInt(document.getElementById('met').value || 0)
            };

            const { error } = await sb.from('assessments').insert([d]);
            
            if (nextDate) {
                await sb.from('profiles').update({ next_assessment_date: nextDate }).eq('id', alunoId);
            }

            if(error) {
                alert('Erro ao salvar: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Salvar e Gerar Evolução';
            } else { 
                alert('Avaliação salva com sucesso!'); 
                window.location.href='alunos.html'; 
            }
        };

        init();
    </script>
</body>
</html>
