<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançar Avaliação | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 class="page-title">Lançar Avaliação</h1>
                <p style="color: var(--text-dim);">Registre os dados de bioimpedância e medidas do aluno.</p>
            </div>
        </header>

        <div class="card">
            <div class="form-group" style="margin-bottom: 32px;">
                <label>Aluno</label>
                <select id="select-aluno">
                    <option value="">Selecione um aluno...</option>
                </select>
            </div>

            <h3 class="section-header">Dados de Bioimpedância</h3>
            <div class="grid-inputs">
                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="weight" step="0.1">
                </div>
                <div class="form-group">
                    <label>% Gordura Corporal</label>
                    <input type="number" id="body_fat" step="0.1">
                </div>
                <div class="form-group">
                    <label>% Massa Muscular</label>
                    <input type="number" id="muscle_mass" step="0.1">
                </div>
                <div class="form-group">
                    <label>Gordura Visceral</label>
                    <input type="number" id="visceral_fat" step="1">
                </div>
                <div class="form-group">
                    <label>Idade Metabólica</label>
                    <input type="number" id="metabolic_age" step="1">
                </div>
                <div class="form-group">
                    <label>Água Corporal (%)</label>
                    <input type="number" id="body_water" step="0.1">
                </div>
            </div>

            <h3 class="section-header">Medidas (cm)</h3>
            <div class="grid-inputs">
                <div class="form-group">
                    <label>Cintura</label>
                    <input type="number" id="waist" step="0.1">
                </div>
                <div class="form-group">
                    <label>Abdomen</label>
                    <input type="number" id="abdomen" step="0.1">
                </div>
                <div class="form-group">
                    <label>Quadril</label>
                    <input type="number" id="hip" step="0.1">
                </div>
            </div>

            <h3 class="section-header">Próximo Passo</h3>
            <div class="form-group" style="margin-bottom: 32px;">
                <label>Data da Próxima Avaliação</label>
                <input type="date" id="next_assessment_date">
            </div>

            <button class="btn btn-primary" id="btn-save" style="width: 100%;">Salvar Avaliação</button>
        </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'lancar_avaliacao.html');

            loadAlunos(session.user.id);
        }

        async function loadAlunos(mentorId) {
            const { data: alunos } = await sb.from('profiles').select('id, full_name').eq('mentor_id', mentorId).eq('role', 'client');
            const select = document.getElementById('select-aluno');
            alunos?.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.id;
                opt.textContent = a.full_name;
                select.appendChild(opt);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const alunoId = urlParams.get('aluno');
            if (alunoId) select.value = alunoId;
        }

        document.getElementById('btn-save').onclick = async () => {
            const { data: { session } } = await sb.auth.getSession();
            const btn = document.getElementById('btn-save');
            const alunoId = document.getElementById('select-aluno').value;
            if (!alunoId) return alert('Selecione um aluno');

            btn.disabled = true; btn.textContent = 'Salvando...';

            const assessment = {
                student_id: alunoId,
                mentor_id: session.user.id,
                weight: parseFloat(document.getElementById('weight').value),
                body_fat: parseFloat(document.getElementById('body_fat').value),
                muscle_mass: parseFloat(document.getElementById('muscle_mass').value),
                visceral_fat: parseFloat(document.getElementById('visceral_fat').value),
                metabolic_age: parseFloat(document.getElementById('metabolic_age').value),
                body_water: parseFloat(document.getElementById('body_water').value),
                waist: parseFloat(document.getElementById('waist').value),
                abdomen: parseFloat(document.getElementById('abdomen').value),
                hip: parseFloat(document.getElementById('hip').value)
            };

            const nextDate = document.getElementById('next_assessment_date').value;

            try {
                await sb.from('assessments').insert([assessment]);
                if (nextDate) {
                    await sb.from('profiles').update({ next_assessment_date: nextDate }).eq('id', alunoId);
                }
                alert('Avaliação salva com sucesso!');
                window.location.href = 'alunos.html';
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.textContent = 'Salvar Avaliação'; }
        };

        init();
    </script>
</body>
</html>
</body>
</html>
