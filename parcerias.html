<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcerias | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8faf9;
            --primary: #2F5948;
            --primary-light: #3d755e;
            --accent: #D96C2B;
            --text-main: #1a1c1b;
            --text-dim: #64748b;
            --white: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--primary); padding: 40px 24px; display: flex; flex-direction: column; color: white; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 48px; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: rgba(255, 255, 255, 0.6); text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }

        /* Content */
        .main-content { flex: 1; padding: 48px; max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 40px; }
        .page-title { font-size: 2.2rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        .section-title { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin: 32px 0 20px; display: flex; align-items: center; gap: 12px; }

        /* Marketplace Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .video-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.02); transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); }

        .video-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; position: relative; }
        .video-info { padding: 20px; }
        .video-info h4 { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
        .mentor-badge { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

        .btn-request { width: 100%; padding: 12px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-request:hover { background: var(--primary-light); }
        .btn-request.requested { background: #f1f5f9; color: var(--text-dim); cursor: default; }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: 72px; padding: 0; position: fixed; 
                bottom: 0; left: 0; top: auto;
                flex-direction: row; background: var(--nav-bg); backdrop-filter: blur(20px); 
                border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; 
            }
            .logo { display: none; }
            .nav-links { 
                flex-direction: row; width: 100%; height: 100%; gap: 0; 
                overflow-x: auto; scrollbar-width: none; 
            }
            .nav-links::-webkit-scrollbar { display: none; }
            .nav-item { 
                flex: 0 0 80px; flex-direction: column; gap: 5px; border-radius: 0; 
                font-size: 0.65rem; color: #94a3b8; padding: 10px 0;
            }
            .nav-item.active { background: transparent; color: var(--primary); }
            .main-content { padding: 24px; padding-bottom: 120px; }
            .header { margin-bottom: 24px; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">Marketplace de Parcerias</h1>
            <p style="color: var(--text-dim);">Encontre conteúdos de outros mentores e enriqueça a experiência dos seus alunos.</p>
        </header>

        <h2 class="section-title"><i class="fas fa-search-dollar"></i> Vídeos Disponíveis</h2>
        <div id="marketplace-grid" class="video-grid">
            <!-- Vídeos Colab -->
        </div>

        <h2 class="section-title" style="margin-top: 60px;"><i class="fas fa-check-double"></i> Meus Vídeos Compartilhados</h2>
        <div id="shared-grid" class="video-grid">
            <!-- Vídeos que já peguei -->
        </div>
    </main>

    <script>
        const sb = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');
        let currentUser = null;

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            currentUser = session.user;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) setupNav(profile);

            loadMarketplace();
        }

        function setupNav(profile) {
            const nav = document.getElementById('nav-links');
            let navHtml = `
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
                <a href="crm_dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Gestão 360</span></a>
                <a href="vendas.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Vendas</span></a>
            `;
            if (profile.role === 'admin' || profile.role === 'superadmin') {
                navHtml += `
                    <a href="videos.html" class="nav-item"><i class="fas fa-play-circle"></i><span>Vídeos</span></a>
                    <a href="parcerias.html" class="nav-item active"><i class="fas fa-handshake"></i><span>Parcerias</span></a>
                    <a href="alunos.html" class="nav-item"><i class="fas fa-users"></i><span>Alunos</span></a>
                    <a href="leads_admin.html" class="nav-item"><i class="fas fa-filter"></i><span>Leads</span></a>
                    <a href="configuracoes.html" class="nav-item"><i class="fas fa-cog"></i><span>Ajustes</span></a>
                `;
            }
            navHtml += `<a href="#" class="nav-item" onclick="handleLogout()" style="margin-top:auto; color:#ef4444;"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>`;
            nav.innerHTML = navHtml;
        }

        async function loadMarketplace() {
            // 1. Pegar vídeos de outros mentores marcados como colab
            const { data: videos } = await sb.from('videos').select('*, profiles!mentor_id(full_name)').neq('mentor_id', currentUser.id).eq('is_colab', true);
            
            // 2. Pegar vídeos que eu já compartilhei (para marcar como "já solicitado")
            const { data: shared } = await sb.from('shared_videos').select('video_id').eq('mentor_id', currentUser.id);
            const sharedIds = shared?.map(s => s.video_id) || [];

            const grid = document.getElementById('marketplace-grid');
            grid.innerHTML = videos?.length ? '' : '<p style="color: var(--text-dim)">Nenhum vídeo disponível para parceria no momento.</p>';

            videos?.forEach(v => {
                const isRequested = sharedIds.includes(v.id);
                const ytId = v.youtube_url.includes('v=') ? v.youtube_url.split('v=')[1].split('&')[0] : v.youtube_url.split('/').pop();
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${ytId}/mqdefault.jpg')"></div>
                    <div class="video-info">
                        <h4>${v.title}</h4>
                        <div class="mentor-badge"><i class="fas fa-user-tie"></i> Mentor: ${v.profiles?.full_name || 'Desconhecido'}</div>
                        <button class="btn-request ${isRequested ? 'requested' : ''}" onclick="${isRequested ? '' : `requestColab('${v.id}')`}">
                            <i class="fas ${isRequested ? 'fa-check-circle' : 'fa-plus'}"></i> 
                            ${isRequested ? 'Já em sua biblioteca' : 'Solicitar Parceria'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function requestColab(videoId) {
            await sb.from('shared_videos').insert([{ video_id: videoId, mentor_id: currentUser.id }]);
            alert('Vídeo adicionado à sua biblioteca para alunos!');
            loadMarketplace();
        }

        async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
