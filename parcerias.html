<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcerias | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header" style="margin-bottom: 40px;">
            <h1 class="page-title">Marketplace de Parcerias</h1>
            <p style="color: var(--text-dim);">Encontre conteúdos de outros mentores e enriqueça a experiência dos seus alunos.</p>
        </header>

        <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-search-dollar"></i> Vídeos Disponíveis</h2>
        <div id="marketplace-grid" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-bottom: 60px;">
            <!-- Vídeos Colab -->
        </div>

        <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-check-double"></i> Meus Vídeos Compartilhados</h2>
        <div id="shared-grid" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
            <!-- Vídeos que já peguei -->
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'parcerias.html');

            loadMarketplace(session.user.id);
        }

        async function loadMarketplace(mentorId) {
            const { data: videos } = await sb.from('videos').select('*, profiles!mentor_id(full_name)').neq('mentor_id', mentorId).eq('is_colab', true);
            const { data: shared } = await sb.from('shared_videos').select('video_id').eq('mentor_id', mentorId);
            const sharedIds = shared?.map(s => s.video_id) || [];

            const grid = document.getElementById('marketplace-grid');
            grid.innerHTML = videos?.length ? '' : '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-dim)">Nenhum vídeo disponível para parceria no momento.</p>';

            videos?.forEach(v => {
                const isRequested = sharedIds.includes(v.id);
                const ytId = v.youtube_url.includes('v=') ? v.youtube_url.split('v=')[1].split('&')[0] : v.youtube_url.split('/').pop();
                const card = document.createElement('div');
                card.className = 'card video-card';
                card.style.padding = '0';
                card.style.overflow = 'hidden';
                card.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 16/9; background: url('https://img.youtube.com/vi/${ytId}/mqdefault.jpg') center/cover;"></div>
                    <div style="padding: 20px;">
                        <h4 style="font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 8px;">${v.title}</h4>
                        <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-dim); margin-bottom: 16px; display: flex; align-items: center; gap: 6px;">
                            <i class="fas fa-user-tie"></i> Mentor: ${v.profiles?.full_name || 'Desconhecido'}
                        </div>
                        <button class="btn ${isRequested ? 'btn-outline' : 'btn-primary'}" style="width: 100%; font-size: 0.85rem;" onclick="${isRequested ? '' : `requestColab('${v.id}')`}" ${isRequested ? 'disabled' : ''}>
                            <i class="fas ${isRequested ? 'fa-check-circle' : 'fa-plus'}"></i> 
                            ${isRequested ? 'Já em sua biblioteca' : 'Solicitar Parceria'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function requestColab(videoId) {
            const { data: { session } } = await sb.auth.getSession();
            await sb.from('shared_videos').insert([{ video_id: videoId, mentor_id: session.user.id }]);
            alert('Vídeo adicionado à sua biblioteca para alunos!');
            loadMarketplace(session.user.id);
        }

        init();
    </script>
</body>
</html>
</body>
</html>
