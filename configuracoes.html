<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content" style="max-width: 800px; margin: 0 auto;">
        <header class="header" style="margin-bottom: 40px;">
            <h1 class="page-title">Configurações</h1>
            <p style="color: var(--text-dim);">Gerencie seus dados e integrações da conta.</p>
        </header>

        <div id="status-msg" class="alert" style="display: none; margin-bottom: 24px;"></div>

        <div class="card" style="margin-bottom: 24px;">
            <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-user-circle"></i> Perfil Profissional</h2>
            <div class="form-group" style="margin-bottom: 24px;">
                <label>Nome Completo</label>
                <input type="text" id="full_name" placeholder="Seu nome" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label>E-mail (Login)</label>
                <input type="text" id="email_display" disabled style="background: #f8faf9; cursor: not-allowed; width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px;">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="updateProfile()">Salvar Alterações</button>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-plug"></i> Integrações</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;">Conecte sua agenda para sincronizar avaliações e lembretes de cobrança.</p>
            <div id="google-status" style="margin-bottom: 15px; font-weight: 700; font-size: 0.9rem;">Verificando conexão...</div>
            <button class="btn btn-primary" id="btn-google" onclick="startGoogleAuth()" style="width: 100%; background: #4285F4; border: none;">
                <i class="fab fa-google"></i> <span id="google-btn-text">Conectar Google Calendar</span>
            </button>
        </div>

        <div class="card" style="border-left: 4px solid #ef4444;">
            <h2 class="card-title" style="color: #ef4444; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;"><i class="fas fa-sign-out-alt"></i> Sair</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;">Encerrar sua sessão atual com segurança.</p>
            <button class="btn btn-outline" style="width: 100%; color: #ef4444; border-color: #ef4444;" onclick="handleLogout()">Sair da Conta</button>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const GOOGLE_CLIENT_ID = '859217445398-8jutv09ole7ci2fmj3djv8skk0gekkjh.apps.googleusercontent.com';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        async function init() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) {
                setupNav(profile, 'configuracoes.html');
                loadProfile(profile, session.user);
                checkGoogleConnection(profile);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) handleGoogleCallback(code, session.user.id);
        }

        function loadProfile(profile, user) {
            document.getElementById('full_name').value = profile.full_name || '';
            document.getElementById('email_display').value = user.email;
        }

        async function updateProfile() {
            const { data: { session } } = await sb.auth.getSession();
            const name = document.getElementById('full_name').value;
            const { error } = await sb.from('profiles').update({ full_name: name }).eq('id', session.user.id);
            
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            if (error) { 
                msg.textContent = error.message; 
                msg.className = "alert alert-error"; 
            } else { 
                msg.textContent = "Perfil atualizado!"; 
                msg.className = "alert alert-success"; 
                setTimeout(() => msg.style.display = 'none', 3000); 
            }
        }

        function checkGoogleConnection(profile) {
            const status = document.getElementById('google-status');
            const btn = document.getElementById('btn-google');
            const text = document.getElementById('google-btn-text');

            if (profile.google_refresh_token) {
                status.innerHTML = '<span style="color:#34a853;"><i class="fas fa-check-circle"></i> Agenda Conectada</span>';
                text.textContent = 'Reconectar Agenda';
                btn.style.background = '#34a853';
            } else {
                status.innerHTML = '<span style="color:#64748b;"><i class="fas fa-times-circle"></i> Não Conectada</span>';
            }
        }

        function startGoogleAuth() {
            const scope = 'https://www.googleapis.com/auth/calendar.events';
            window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GOOGLE_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=${scope}&access_type=offline&prompt=consent`;
        }

        async function handleGoogleCallback(code, userId) {
            const status = document.getElementById('google-status');
            status.innerHTML = '<span style="color:var(--primary);">Finalizando conexão...</span>';

            try {
                // Chamada segura para a Edge Function do Supabase
                const { data, error } = await sb.functions.invoke('google-auth-exchange', {
                    body: { code, redirect_uri: REDIRECT_URI }
                });

                if (error) throw error;

                if (data.refresh_token) {
                    await sb.from('profiles').update({ 
                        google_refresh_token: data.refresh_token 
                    }).eq('id', userId);
                    
                    // Limpar URL e recarregar
                    window.location.href = 'configuracoes.html';
                } else {
                    throw new Error('Nenhum refresh_token recebido do Google');
                }
            } catch (err) {
                console.error('Erro na conexão Google:', err);
                alert('Erro ao conectar com o Google: ' + err.message);
                status.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-exclamation-circle"></i> Erro na Conexão</span>';
            }
        }

        init();
    </script>
</body>
</html>
</body>
</html>
