<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <main class="container">
        <div class="bento-grid">
            <!-- Header -->
            <div class="card-shell reveal" style="grid-column: span 12;">
                <div class="card-core">
                    <span class="eyebrow">Preferências do Sistema</span>
                    <h1 style="margin: 4px 0;">CONFIGURAÇÕES</h1>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Personalização do perfil e credenciais de segurança.</p>
                </div>
            </div>

            <!-- Profile Settings -->
            <div class="card-shell reveal" style="grid-column: span 8; animation-delay: 0.1s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg);">PERFIL PROFISSIONAL</h3>
                    <form id="profile-form">
                        <div class="grid-stack" style="grid-template-columns: 1fr 1fr; gap: var(--space-md);">
                            <div class="form-group">
                                <label>NOME COMPLETO</label>
                                <input type="text" id="full-name" required>
                            </div>
                            <div class="form-group">
                                <label>WHATSAPP (COM DDD)</label>
                                <input type="tel" id="whatsapp" placeholder="Ex: 11999999999">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>E-MAIL DE ACESSO</label>
                            <input type="email" id="profile-email" disabled style="opacity: 0.5;">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: var(--space-md);">
                            SALVAR ALTERAÇÕES
                            <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-floppy-disk"></i></div>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="card-shell reveal" style="grid-column: span 4; animation-delay: 0.2s;">
                <div class="card-core">
                    <h3 style="margin-bottom: var(--space-lg); color: #ef4444;">SEGURANÇA</h3>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: var(--space-lg);">Gerencie sua sessão e acesso ao ecossistema.</p>
                    
                    <button class="btn" onclick="App.logout()" style="width: 100%; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);">
                        ENCERRAR SESSÃO
                        <div class="btn-icon" style="background: rgba(239, 68, 68, 0.1);"><i class="ph-bold ph-sign-out"></i></div>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="container" style="padding: var(--space-xl) var(--space-md); text-align: center; color: var(--text-secondary); font-size: 0.7rem; letter-spacing: 0.1em;">
        &copy; 2026 SHAPETRACK // HIGH-END PERFORMANCE ECOSYSTEM
    </footer>

    <script src="js/config.js?v=3.5"></script>
    <script>
        async function init() {
            const context = await App.init('configuracoes.html');
            if (!context) return;
            
            document.getElementById('full-name').value = context.profile.full_name || '';
            document.getElementById('whatsapp').value = context.profile.whatsapp || '';
            document.getElementById('profile-email').value = context.session.user.email;
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('full-name').value;
            const whatsapp = document.getElementById('whatsapp').value;
            
            const { error } = await sb.from('profiles').update({ 
                full_name: fullName,
                whatsapp: whatsapp
            }).eq('id', App.profile.id);

            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Configurações atualizadas com sucesso!');
                // Refresh local cache
                const { data } = await sb.from('profiles').select('*').eq('id', App.profile.id).single();
                sessionStorage.setItem('st_profile', JSON.stringify(data));
            }
        };

        init();
    </script>
</body>
</html>
