<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Alunos | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8faf9;
            --primary: #2F5948;
            --primary-light: #3d755e;
            --accent: #D96C2B;
            --text-main: #1a1c1b;
            --text-dim: #64748b;
            --white: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--primary); padding: 40px 24px; display: flex; flex-direction: column; color: white; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 48px; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: rgba(255, 255, 255, 0.6); text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }

        /* Content */
        .main-content { flex: 1; padding: 48px; max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .page-title { font-size: 2.2rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        /* Search & Actions */
        .actions-bar { display: flex; gap: 16px; align-items: center; margin-bottom: 32px; }
        .search-box { flex: 1; position: relative; }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .search-box input { width: 100%; padding: 14px 14px 14px 48px; border: 2px solid #f1f5f9; border-radius: 16px; background: white; font-size: 0.95rem; outline: none; transition: 0.2s; }
        .search-box input:focus { border-color: var(--primary); }

        .btn-invite { background: var(--accent); color: white; padding: 14px 24px; border-radius: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-invite:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(217, 108, 43, 0.2); }

        /* Alunos Grid */
        .alunos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .aluno-card { background: white; padding: 24px; border-radius: 24px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 20px; transition: 0.3s; }
        .aluno-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }

        .aluno-info { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 56px; height: 56px; background: #f1f5f9; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        .aluno-details h3 { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 2px; }
        .aluno-details p { font-size: 0.85rem; color: var(--text-dim); }

        .aluno-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { padding: 12px; border-radius: 12px; border: 1.5px solid #f1f5f9; background: white; color: var(--primary); font-weight: 700; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-action:hover { background: #f8faf9; border-color: var(--primary); }
        .btn-action.primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-action.primary:hover { background: var(--primary-light); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: white; padding: 32px; border-radius: 24px; max-width: 500px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .modal-title { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; }

        /* Mobile */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 40px 15px; }
            .logo { font-size: 0; justify-content: center; }
            .nav-item span { display: none; }
            .main-content { padding: 32px; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 72px; padding: 0; position: fixed; bottom: 0; left: 0; flex-direction: row; background: var(--nav-bg); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
            .logo { display: none; }
            .nav-links { flex-direction: row; width: 100%; height: 100%; gap: 0; }
            .nav-item { flex: 1; flex-direction: column; gap: 5px; border-radius: 0; font-size: 0.65rem; color: #94a3b8; }
            .nav-item.active { background: transparent; color: var(--primary); }
            .main-content { padding: 24px; padding-bottom: 100px; }
            .header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .actions-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 class="page-title">Meus Alunos</h1>
                <p style="color: var(--text-dim);">Acompanhe e gerencie o progresso dos seus alunos.</p>
            </div>
            <button class="btn-invite" onclick="showInviteModal()">
                <i class="fas fa-user-plus"></i> Gerar Convite
            </button>
        </header>

        <div class="actions-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-alunos" placeholder="Buscar aluno por nome..." oninput="filterAlunos()">
            </div>
        </div>

        <div id="alunos-list" class="alunos-grid">
            <!-- Alunos -->
        </div>
    </main>

    <!-- Invite Modal -->
    <div id="inviteModal" class="modal">
        <div class="modal-card">
            <h2 class="modal-title">Novo Aluno</h2>
            <p style="color: var(--text-dim); margin-bottom: 24px;">Envie este link para seu novo aluno. Ele poderá criar a conta e já estará vinculado a você.</p>
            <div class="form-group">
                <label>Link de Convite</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="invite-link" readonly style="background: #f8faf9; color: var(--primary); font-weight: 700;">
                    <button class="btn-invite" onclick="copyLink()" style="padding: 14px;"><i class="fas fa-copy"></i></button>
                </div>
            </div>
            <button class="btn-action primary" style="width: 100%; padding: 16px;" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <!-- CRM Modal -->
    <div id="crmModal" class="modal">
        <div class="modal-card">
            <h2 class="modal-title">Perfil CRM</h2>
            <input type="hidden" id="crm-aluno-id">
            <div class="form-group">
                <label>Data de Aniversário</label>
                <input type="date" id="crm-birthday">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; background: #f8faf9; padding: 15px; border-radius: 12px;">
                <input type="checkbox" id="crm-business" style="width: 20px; height: 20px;">
                <label style="margin-bottom: 0; text-transform: none;">Negócio Apresentado?</label>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 24px;">
                <button class="btn-action" onclick="closeModal()">Cancelar</button>
                <button class="btn-action primary" onclick="saveCRM()">Salvar Dados</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://xsgjttyrxhwmtxlvbdoa.supabase.co', 'sb_publishable_9XOfZAQbRbU8_Yn46tueoA_g9fqESrU');
        let allAlunos = [];
        let currentUser = null;

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            currentUser = session.user;
            
            const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) setupNav(profile);

            loadAlunos();
        }

        function setupNav(profile) {
            const nav = document.getElementById('nav-links');
            let navHtml = `
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
                <a href="crm_dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Gestão 360</span></a>
                <a href="vendas.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Vendas</span></a>
            `;
            if (profile.role === 'admin' || profile.role === 'superadmin') {
                navHtml += `
                    <a href="videos.html" class="nav-item"><i class="fas fa-play-circle"></i><span>Vídeos</span></a>
                    <a href="parcerias.html" class="nav-item"><i class="fas fa-handshake"></i><span>Parcerias</span></a>
                    <a href="alunos.html" class="nav-item active"><i class="fas fa-users"></i><span>Alunos</span></a>
                    <a href="leads_admin.html" class="nav-item"><i class="fas fa-filter"></i><span>Leads</span></a>
                    <a href="configuracoes.html" class="nav-item"><i class="fas fa-cog"></i><span>Ajustes</span></a>
                `;
            }
            navHtml += `<a href="#" class="nav-item" onclick="handleLogout()" style="margin-top:auto; color:#ef4444;"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>`;
            nav.innerHTML = navHtml;
        }

        async function loadAlunos() {
            const { data: alunos } = await sb.from('profiles').select('*').eq('mentor_id', currentUser.id).eq('role', 'client').order('full_name');
            allAlunos = alunos || [];
            renderAlunos(allAlunos);
        }

        function renderAlunos(list) {
            const container = document.getElementById('alunos-list');
            container.innerHTML = list.length ? '' : '<p style="text-align:center; padding: 40px; color: var(--text-dim);">Nenhum aluno encontrado.</p>';
            
            list.forEach(aluno => {
                const initials = aluno.full_name?.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
                const card = document.createElement('div');
                card.className = 'aluno-card';
                card.innerHTML = `
                    <div class="aluno-info">
                        <div class="avatar">${initials || '?'}</div>
                        <div class="aluno-details">
                            <h3>${aluno.full_name}</h3>
                            <p><i class="fas fa-calendar-alt"></i> Ativo desde ${new Date(aluno.created_at).toLocaleDateString('pt-BR')}</p>
                        </div>
                    </div>
                    <div class="aluno-actions">
                        <a href="lancar_avaliacao.html?aluno=${aluno.id}" class="btn-action primary"><i class="fas fa-plus"></i> Avaliar</a>
                        <button class="btn-action" onclick="openCRM('${aluno.id}')"><i class="fas fa-user-cog"></i> CRM</button>
                        <a href="relatorio.html?aluno=${aluno.id}" class="btn-action"><i class="fas fa-chart-line"></i> Relatório</a>
                        <a href="https://wa.me/55${aluno.whatsapp?.replace(/\D/g,'')}" target="_blank" class="btn-action"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterAlunos() {
            const query = document.getElementById('search-alunos').value.toLowerCase();
            renderAlunos(allAlunos.filter(a => a.full_name.toLowerCase().includes(query)));
        }

        function showInviteModal() {
            const baseUrl = window.location.origin + window.location.pathname.replace('alunos.html', 'cadastro.html');
            document.getElementById('invite-link').value = `${baseUrl}?mentor=${currentUser.id}`;
            document.getElementById('inviteModal').style.display = 'flex';
        }

        async function openCRM(alunoId) {
            const aluno = allAlunos.find(a => a.id === alunoId);
            document.getElementById('crm-aluno-id').value = alunoId;
            document.getElementById('crm-birthday').value = aluno.birthday || '';
            document.getElementById('crm-business').checked = aluno.business_presented || false;
            document.getElementById('crmModal').style.display = 'flex';
        }

        async function saveCRM() {
            const id = document.getElementById('crm-aluno-id').value;
            const bday = document.getElementById('crm-birthday').value;
            const business = document.getElementById('crm-business').checked;

            const { error } = await sb.from('profiles').update({ birthday: bday, business_presented: business }).eq('id', id);
            if (error) return alert(error.message);
            
            alert('Dados salvos!');
            closeModal();
            loadAlunos();
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function copyLink() {
            const input = document.getElementById('invite-link');
            input.select();
            document.execCommand('copy');
            alert('Link copiado!');
        }

        async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
