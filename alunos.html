<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Alunos | ShapeTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">SHAPE<span>TRACK</span></div>
        <nav id="nav-links" class="nav-links"></nav>
    </aside>

    <main class="main-content">
        <header class="header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
            <div>
                <h1 class="page-title">Meus Alunos</h1>
                <p style="color: var(--text-dim);">Acompanhe e gerencie o progresso dos seus alunos.</p>
            </div>
            <button class="btn btn-accent" onclick="showInviteModal()">
                <i class="fas fa-user-plus"></i> Gerar Convite
            </button>
        </header>

        <div class="actions-bar" style="display: flex; gap: 16px; align-items: center; margin-bottom: 32px;">
            <div class="search-box" style="flex: 1; position: relative;">
                <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim);"></i>
                <input type="text" id="search-alunos" placeholder="Buscar aluno por nome..." oninput="filterAlunos()" style="width: 100%; padding: 14px 14px 14px 48px; border: 2px solid #f1f5f9; border-radius: 16px; outline: none;">
            </div>
        </div>

        <div id="alunos-list" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
            <!-- Alunos -->
        </div>
    </main>

    <!-- Invite Modal -->
    <div id="inviteModal" class="modal" onclick="if(event.target === this) this.style.display='none'">
        <div class="modal-card">
            <h2 class="modal-title">Novo Aluno</h2>
            <p style="color: var(--text-dim); margin-bottom: 24px;">Envie este link para seu novo aluno. Ele poderá criar a conta e já estará vinculado a você.</p>
            <div class="form-group">
                <label>Link de Convite</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="invite-link" readonly style="background: #f8faf9; color: var(--primary); font-weight: 700; width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px;">
                    <button class="btn btn-accent" onclick="copyLink()" style="padding: 14px;"><i class="fas fa-copy"></i></button>
                </div>
            </div>
            <button class="btn btn-outline" onclick="document.getElementById('inviteModal').style.display='none'" style="width: 100%; margin-top: 10px;">Fechar</button>
        </div>
    </div>

    <!-- CRM Modal -->
    <div id="crmModal" class="modal">
        <div class="modal-card">
            <h2 class="modal-title">Perfil CRM</h2>
            <input type="hidden" id="crm-aluno-id">
            <div class="form-group">
                <label>Data de Aniversário</label>
                <input type="date" id="crm-birthday">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; background: #f8faf9; padding: 15px; border-radius: 12px;">
                <input type="checkbox" id="crm-business" style="width: 20px; height: 20px;">
                <label style="margin-bottom: 0; text-transform: none;">Negócio Apresentado?</label>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 24px;">
                <button class="btn-action" onclick="closeModal()">Cancelar</button>
                <button class="btn-action primary" onclick="saveCRM()">Salvar Dados</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let allAlunos = [];

        async function init() {
            const session = await checkAuth();
            if (!session) return;

            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) setupNav(profile, 'alunos.html');

            loadAlunos(session.user.id);
        }

        async function loadAlunos(mentorId) {
            const { data, error } = await sb.from('profiles').select('*').eq('mentor_id', mentorId).eq('role', 'client').order('full_name');
            if (error) { console.error(error); return; }
            allAlunos = data;
            renderAlunos(allAlunos);
        }

        function renderAlunos(alunos) {
            const container = document.getElementById('alunos-list');
            container.innerHTML = alunos.length ? '' : '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-dim);">Nenhum aluno cadastrado.</div>';

            alunos.forEach(aluno => {
                const initials = aluno.full_name?.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                const card = document.createElement('div');
                card.className = 'card aluno-card';
                card.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                        <div style="width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem;">${initials || '?'}</div>
                        <div>
                            <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--primary);">${aluno.full_name}</h3>
                            <p style="font-size: 0.8rem; color: var(--text-dim);"><i class="fas fa-calendar-alt"></i> Ativo desde ${new Date(aluno.created_at).toLocaleDateString('pt-BR')}</p>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <a href="lancar_avaliacao.html?aluno=${aluno.id}" class="btn btn-primary" style="font-size: 0.75rem; padding: 8px;"><i class="fas fa-plus"></i> Avaliar</a>
                        <button class="btn btn-outline" style="font-size: 0.75rem; padding: 8px;" onclick="openCRM('${aluno.id}')"><i class="fas fa-user-cog"></i> CRM</button>
                        <a href="relatorio.html?aluno=${aluno.id}" class="btn btn-outline" style="font-size: 0.75rem; padding: 8px;"><i class="fas fa-chart-line"></i> Evolução</a>
                        <a href="https://wa.me/55${aluno.whatsapp?.replace(/\D/g,'')}" target="_blank" class="btn btn-outline" style="font-size: 0.75rem; padding: 8px; color: #25d366; border-color: #25d366;"><i class="fab fa-whatsapp"></i> Contato</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterAlunos() {
            const query = document.getElementById('search-alunos').value.toLowerCase();
            renderAlunos(allAlunos.filter(a => a.full_name.toLowerCase().includes(query)));
        }

        function showInviteModal() {
            const baseUrl = window.location.origin + window.location.pathname.replace('alunos.html', 'cadastro.html');
            document.getElementById('invite-link').value = `${baseUrl}?mentor=${currentUser.id}`;
            document.getElementById('inviteModal').style.display = 'flex';
        }

        async function openCRM(alunoId) {
            const aluno = allAlunos.find(a => a.id === alunoId);
            document.getElementById('crm-aluno-id').value = alunoId;
            document.getElementById('crm-birthday').value = aluno.birthday || '';
            document.getElementById('crm-business').checked = aluno.business_presented || false;
            document.getElementById('crmModal').style.display = 'flex';
        }

        async function saveCRM() {
            const id = document.getElementById('crm-aluno-id').value;
            const bday = document.getElementById('crm-birthday').value;
            const business = document.getElementById('crm-business').checked;

            const { error } = await sb.from('profiles').update({ birthday: bday, business_presented: business }).eq('id', id);
            if (error) return alert(error.message);
            
            alert('Dados salvos!');
            closeModal();
            loadAlunos();
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function copyLink() {
            const input = document.getElementById('invite-link');
            input.select();
            document.execCommand('copy');
            alert('Link copiado!');
        }

        async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
