<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolos Ativos // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.9">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <div class="bento-grid">
        <!-- Header -->
        <div class="card-shell reveal span-12">
            <div class="card-core">
                <div class="header-content">
                    <span class="eyebrow">Monitoramento de Ativos</span>
                    <h1>HUMAN DATA</h1>
                    <p class="text-secondary">Gestão de performance e retenção individualizada.</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showInviteModal()">
                        GERAR CONVITE
                        <div class="btn-icon"><i class="ph-light ph-user-plus"></i></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="card-shell reveal span-12">
            <div class="card-core">
                <div class="search-bar">
                    <i class="ph-light ph-magnifying-glass"></i>
                    <input type="text" id="search-alunos" placeholder="BUSCAR POR NOME OU ID..." oninput="filterAlunos()">
                </div>
            </div>
        </div>

        <!-- Alunos Grid -->
        <div id="alunos-grid" class="span-12" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;">
            <!-- Alunos -->
        </div>
    </div>

    <!-- Invite Modal -->

    <!-- Invite Modal -->
    <div id="inviteModal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="card-shell modal-card reveal">
            <div class="card-core">
                <h2 style="margin-bottom: 12px;">NOVO ATIVO</h2>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px;">Distribua o link de conexão para vincular novos alunos ao seu protocolo.</p>
                <div class="form-group">
                    <label>LINK DE CONVITE</label>
                    <div style="display: flex; gap: 12px;">
                        <input type="text" id="invite-link" readonly style="background: rgba(255,255,255,0.02);">
                        <button class="btn" style="background: var(--accent); color: #FFF; padding: 0 20px;" onclick="copyLink()"><i class="ph-light ph-copy"></i></button>
                    </div>
                </div>
                <button class="btn" onclick="closeModal()" style="width: 100%; background: rgba(255,255,255,0.05); color: #FFF; margin-top: 12px;">FECHAR</button>
            </div>
        </div>
    </div>

    <!-- CRM Modal -->
    <div id="crmModal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="card-shell modal-card reveal" style="width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <div class="card-core">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 style="font-size: 1.2rem;">AJUSTE DE <span class="text-gradient">PERFIL</span></h2>
                    <button class="btn-close" onclick="closeModal()"><i class="ph-bold ph-x"></i></button>
                </div>
                
                <input type="hidden" id="crm-aluno-id">
                
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-group span-2" style="grid-column: span 2;">
                        <label>NOME COMPLETO</label>
                        <input type="text" id="crm-name" placeholder="NOME DO ALUNO">
                    </div>
                    <div class="form-group">
                        <label>WHATSAPP</label>
                        <input type="text" id="crm-whatsapp" placeholder="11999999999">
                    </div>
                    <div class="form-group">
                        <label>E-MAIL</label>
                        <input type="email" id="crm-email" placeholder="email@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label>NASCIMENTO</label>
                        <input type="date" id="crm-birthday">
                    </div>
                    <div class="form-group">
                        <label>ALTURA (CM)</label>
                        <input type="number" id="crm-height" placeholder="175">
                    </div>
                    <div class="form-group">
                        <label>GÊNERO</label>
                        <select id="crm-gender">
                            <option value="masculino">MASCULINO</option>
                            <option value="feminino">FEMININO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>OBJETIVO</label>
                        <select id="crm-goal">
                            <option value="perda">PERDA DE PESO</option>
                            <option value="ganho">GANHO DE MASSA</option>
                            <option value="manutencao">MANUTENÇÃO</option>
                        </select>
                    </div>
                    <div class="form-group span-2" style="grid-column: span 2;">
                        <label>OBSERVAÇÕES DO PROTOCOLO</label>
                        <textarea id="crm-notes" placeholder="HISTÓRICO..." style="width: 100%; height: 80px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 12px; color: #FFF; padding: 12px;"></textarea>
                    </div>
                    <div class="form-group span-2" style="grid-column: span 2; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="crm-business" style="width: 20px; height: 20px;">
                        <label style="margin-bottom: 0;">NEGÓCIO APRESENTADO?</label>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 32px;">
                    <button class="btn" onclick="closeModal()" style="background: rgba(255,255,255,0.05); color: #FFF;">CANCELAR</button>
                    <button class="btn btn-primary" onclick="saveCRM()">SALVAR ALTERAÇÕES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=3.9"></script>
    <script>
        let allAlunos = [];

        async function init() {
            const context = await App.init('alunos.html');
            if (!context) return;
            loadAlunos(context.session.user.id);
        }

        async function loadAlunos(mentorId) {
            const { data, error } = await sb.from('profiles').select('*').eq('mentor_id', mentorId).eq('role', 'client').order('full_name');
            if (error) return;
            allAlunos = data;
            renderAlunos(allAlunos);
        }

        function renderAlunos(alunos) {
            const container = document.getElementById('alunos-grid');
            container.innerHTML = alunos.length ? '' : '<div class="card-shell" style="grid-column: 1/-1;"><div class="card-core" style="text-align: center; padding: 64px; color: var(--text-secondary);">NENHUM PROTOCOLO IDENTIFICADO NA REDE.</div></div>';

            alunos.forEach(aluno => {
                const initials = aluno.full_name?.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                const card = document.createElement('div');
                card.className = 'card-shell reveal';
                card.innerHTML = `
                    <div class="card-core">
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                            <div style="width: 48px; height: 48px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; border: 2px solid var(--accent);">${initials || '?'}</div>
                            <div style="flex: 1;">
                                <h3 style="font-size: 1rem; margin: 0; color: #FFF;">${aluno.full_name.toUpperCase()}</h3>
                                <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">DESDE ${new Date(aluno.created_at).toLocaleDateString('pt-BR')}</p>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <a href="lancar_avaliacao.html?aluno=${aluno.id}" class="btn" style="background: var(--accent); color: #FFF; font-size: 0.7rem;"><i class="ph-light ph-clipboard-text"></i> AVALIAR</a>
                            <button class="btn" style="background: rgba(255,255,255,0.05); color: #FFF; font-size: 0.7rem;" onclick="openCRM('${aluno.id}')"><i class="ph-light ph-user-circle-gear"></i> PERFIL</button>
                            <a href="relatorio.html?aluno=${aluno.id}" class="btn" style="background: rgba(255,255,255,0.05); color: #FFF; font-size: 0.7rem;"><i class="ph-light ph-chart-line-up"></i> EVOLUÇÃO</a>
                            <a href="https://wa.me/55${aluno.whatsapp?.replace(/\D/g,'')}" target="_blank" class="btn btn-whatsapp" style="font-size: 0.7rem;"><i class="ph-fill ph-whatsapp-logo"></i> CONTATO</a>
                            <button class="btn btn-danger" style="grid-column: span 2; font-size: 0.7rem;" onclick="deleteAluno('${aluno.id}')"><i class="ph-light ph-trash"></i> EXCLUIR PERFIL</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterAlunos() {
            const query = document.getElementById('search-alunos').value.toLowerCase();
            renderAlunos(allAlunos.filter(a => a.full_name.toLowerCase().includes(query)));
        }

        function showInviteModal() {
            const baseUrl = window.location.origin + window.location.pathname.replace('alunos.html', 'cadastro_aluno.html');
            document.getElementById('invite-link').value = `${baseUrl}?mentor=${App.profile.id}`;
            document.getElementById('inviteModal').style.display = 'flex';
        }

        function openCRM(alunoId) {
            const aluno = allAlunos.find(a => a.id === alunoId);
            document.getElementById('crm-aluno-id').value = alunoId;
            document.getElementById('crm-name').value = aluno.full_name || '';
            document.getElementById('crm-whatsapp').value = aluno.whatsapp || aluno.phone || '';
            document.getElementById('crm-email').value = aluno.email || '';
            document.getElementById('crm-birthday').value = aluno.birthday || '';
            document.getElementById('crm-height').value = aluno.height || '';
            document.getElementById('crm-gender').value = aluno.gender || 'masculino';
            document.getElementById('crm-goal').value = aluno.goal || 'perda';
            document.getElementById('crm-notes').value = aluno.notes || '';
            document.getElementById('crm-business').checked = aluno.business_presented || false;
            document.getElementById('crmModal').style.display = 'flex';
        }

        async function saveCRM() {
            const id = document.getElementById('crm-aluno-id').value;
            const updates = {
                full_name: document.getElementById('crm-name').value,
                whatsapp: document.getElementById('crm-whatsapp').value,
                email: document.getElementById('crm-email').value,
                birthday: document.getElementById('crm-birthday').value,
                height: parseFloat(document.getElementById('crm-height').value),
                gender: document.getElementById('crm-gender').value,
                goal: document.getElementById('crm-goal').value,
                notes: document.getElementById('crm-notes').value,
                business_presented: document.getElementById('crm-business').checked
            };
            const { error } = await sb.from('profiles').update(updates).eq('id', id);
            if (error) return showToast(error.message, 'error');
            showToast('Perfil atualizado!');
            closeModal();
            loadAlunos(App.profile.id);
        }

        async function deleteAluno(alunoId) {
            if (!confirm('Deseja realmente excluir este perfil? Isso removerá todos os dados vinculados.')) return;
            const { error } = await sb.from('profiles').delete().eq('id', alunoId);
            if (error) return showToast(error.message, 'error');
            showToast('Perfil removido!');
            loadAlunos(App.profile.id);
        }

        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function copyLink() {
            const input = document.getElementById('invite-link');
            input.select();
            document.execCommand('copy');
            showToast('Link copiado!');
        }

        init();
    </script>
</body>
</html>
