<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos // ShapeTrack Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <nav class="navbar reveal"></nav>

    <main class="container">
        <div class="bento-grid">
            <!-- Header -->
            <div class="card-shell reveal" style="grid-column: span 12;">
                <div class="card-core" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-md);">
                    <div>
                        <span class="eyebrow">Base de Dados</span>
                        <h1 style="margin: 4px 0;">GESTÃO DE ALUNOS</h1>
                        <p style="color: var(--text-secondary); font-size: 0.85rem;">Perfis, métricas e telemetria biométrica.</p>
                    </div>
                    <button class="btn btn-primary" onclick="window.location.href='cadastro_aluno.html'">
                        NOVO ALUNO
                        <div class="btn-icon" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ph-bold ph-plus"></i></div>
                    </button>
                </div>
            </div>

            <!-- List Section -->
            <div class="card-shell reveal" style="grid-column: span 12; animation-delay: 0.1s;">
                <div class="card-core">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg); flex-wrap: wrap; gap: var(--space-md);">
                        <h3>ALUNOS ATIVOS</h3>
                        <input type="text" id="search-alunos" placeholder="BUSCAR POR NOME..." style="max-width: 300px; padding: 12px 20px;">
                    </div>
                    
                    <div id="alunos-grid" class="grid-stack">
                        <!-- Injected by JS -->
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-secondary);">CARREGANDO BASE DE DADOS...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container" style="padding: var(--space-xl) var(--space-md); text-align: center; color: var(--text-secondary); font-size: 0.7rem; letter-spacing: 0.1em;">
        &copy; 2026 SHAPETRACK // HIGH-END PERFORMANCE ECOSYSTEM
    </footer>

    <script src="js/config.js?v=3.5"></script>
    <script>
        async function init() {
            const context = await App.init('alunos.html');
            if (!context) return;
            loadAlunos(context.session.user.id);
        }

        async function loadAlunos(userId) {
            const { data, error } = await sb.from('profiles').select('*').eq('mentor_id', userId).eq('role', 'client');
            const grid = document.getElementById('alunos-grid');
            
            if (data && data.length > 0) {
                grid.innerHTML = data.map(aluno => `
                    <div class="card-shell">
                        <div class="card-core" style="padding: var(--space-lg);">
                            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                                <div style="width: 48px; height: 48px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem;">${aluno.full_name.charAt(0)}</div>
                                <div>
                                    <div style="font-weight: 700; font-size: 0.9rem;">${aluno.full_name.toUpperCase()}</div>
                                    <div style="font-size: 0.7rem; color: var(--text-secondary);">${aluno.email}</div>
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; font-size: 0.75rem;">
                                <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px;">
                                    <span style="display: block; color: var(--text-secondary); font-size: 0.6rem;">PESO</span>
                                    <span style="font-weight: 700;">${aluno.last_weight || '--'} kg</span>
                                </div>
                                <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px;">
                                    <span style="display: block; color: var(--text-secondary); font-size: 0.6rem;">STATUS</span>
                                    <span style="font-weight: 700; color: var(--accent);">${(aluno.status || 'Ativo').toUpperCase()}</span>
                                </div>
                            </div>
                            <a href="perfil_aluno.html?id=${aluno.id}" class="btn" style="width: 100%; padding: 10px; font-size: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);">ACESSAR PERFIL</a>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-secondary);">NENHUM ALUNO ENCONTRADO</div>`;
            }
        }

        init();
    </script>
</body>
</html>
